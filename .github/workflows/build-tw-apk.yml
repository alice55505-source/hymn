            'еҸ·':'иҷҹ','жұү':'жјў','ж¬ў':'жӯЎ','иҝҳ':'йӮ„','еҚҺ':'иҸҜ','иҜқ':'и©ұ','еҲ’':'еҠғ','жҖҖ':'жҮ·',
