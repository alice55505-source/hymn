name: Build Traditional Chinese APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-tw-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          curl -fL -o apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
          ls -lh apktool.jar

      - name: Download HymnchtTV APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_URL=$(gh api repos/cmeng-git/hymnchtv/releases/latest \
            --jq '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' \
            | head -1)
          echo "Downloading: $APK_URL"
          curl -fL -o hymnchtv-release.apk "$APK_URL"
          ls -lh hymnchtv-release.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d hymnchtv-release.apk -o hymnchtv-decompiled -f

      - name: Patch smali to force Traditional Chinese locale
        run: |
          # LocaleHelper.smali: change all "zh_CN" defaults to "zh_TW"
          LOCALE_HELPER=$(find hymnchtv-decompiled -name "LocaleHelper.smali" | head -1)
          if [ -n "$LOCALE_HELPER" ]; then
            sed -i 's/"zh_CN"/"zh_TW"/g' "$LOCALE_HELPER"
            echo "Patched $LOCALE_HELPER"
            grep -n "zh_" "$LOCALE_HELPER" || true
          else
            echo "WARNING: LocaleHelper.smali not found"
          fi

          # HymnsApp.smali: change SharedPreferences default from zh_CN to zh_TW
          HYMNS_APP=$(find hymnchtv-decompiled -name "HymnsApp.smali" | head -1)
          if [ -n "$HYMNS_APP" ]; then
            sed -i 's/const-string \(.*\), "zh_CN"/const-string \1, "zh_TW"/g' "$HYMNS_APP"
            echo "Patched $HYMNS_APP"
            grep -n "zh_" "$HYMNS_APP" || true
          else
            echo "WARNING: HymnsApp.smali not found"
          fi

          # MainActivity.smali: change language picker selection from zh_CN to zh_TW
          MAIN_ACTIVITY=$(find hymnchtv-decompiled -name "MainActivity.smali" | head -1)
          if [ -n "$MAIN_ACTIVITY" ]; then
            sed -i 's/const-string \(.*\), "zh_CN"/const-string \1, "zh_TW"/g' "$MAIN_ACTIVITY"
            echo "Patched $MAIN_ACTIVITY"
            grep -n "zh_" "$MAIN_ACTIVITY" | head -20 || true
          else
            echo "WARNING: MainActivity.smali not found"
          fi

      - name: Add score/lyrics toggle button and patch ContentView smali
        run: |
          python3 << 'PYEOF'
          import re

          # --- 1. Wrap score ImageViews in score_container in content_lyrics.xml ---
          LAYOUT = 'hymnchtv-decompiled/res/layout/content_lyrics.xml'
          with open(LAYOUT, encoding='utf-8') as f:
              content = f.read()

          # Find the first ImageView (contentView) and the button row LinearLayout
          # Wrap all 5 ImageViews in a score_container LinearLayout
          IMAGES_BLOCK = (
              '<ImageView android:id="@id/contentView" android:layout_width="fill_parent" '
              'android:layout_height="fill_parent" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_a" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_b" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_c" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_d" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />'
          )
          IMAGES_WRAPPED = (
              '<LinearLayout android:id="@id/score_container" android:orientation="vertical" '
              'android:layout_width="fill_parent" android:layout_height="wrap_content">\n'
              '        <ImageView android:id="@id/contentView" android:layout_width="fill_parent" '
              'android:layout_height="fill_parent" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_a" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_b" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_c" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_d" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        </LinearLayout>'
          )
          if IMAGES_BLOCK in content:
              content = content.replace(IMAGES_BLOCK, IMAGES_WRAPPED)
              print("Wrapped score images in score_container")
          else:
              # Fallback: simple regex approach
              content = re.sub(
                  r'(<ImageView android:id="@id/contentView"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_a"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_b"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_c"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_d"[^/]*/>)',
                  r'<LinearLayout android:id="@id/score_container" android:orientation="vertical" android:layout_width="fill_parent" android:layout_height="wrap_content">\n        \1\n        </LinearLayout>',
                  content, flags=re.DOTALL
              )
              print("Wrapped score images in score_container (regex fallback)")

          with open(LAYOUT, 'w', encoding='utf-8') as f:
              f.write(content)

          # --- 2. Add score_container to public.xml ---
          PUBLIC = 'hymnchtv-decompiled/res/values/public.xml'
          with open(PUBLIC, encoding='utf-8') as f:
              pub = f.read()
          SCORE_ENTRY = '    <public type="id" name="score_container" id="0x7f0a02b7" />\n'
          if 'score_container' not in pub:
              # Insert after youtube_player_view entry
              pub = pub.replace(
                  '    <public type="id" name="zoom" id="0x7f0a02b6" />',
                  '    <public type="id" name="zoom" id="0x7f0a02b6" />\n' + SCORE_ENTRY
              )
              with open(PUBLIC, 'w', encoding='utf-8') as f:
                  f.write(pub)
              print("Added score_container to public.xml")

          # --- 3. Change button_ts label in strings.xml ---
          for path in [
              'hymnchtv-decompiled/res/values/strings.xml',
              'hymnchtv-decompiled/res/values-zh-rTW/strings.xml',
              'hymnchtv-decompiled/res/values-zh-rCN/strings.xml',
          ]:
              import os
              if not os.path.exists(path):
                  continue
              with open(path, encoding='utf-8') as f:
                  s = f.read()
              s = re.sub(
                  r'<string name="lyrics_chinese_traditional">.*?</string>',
                  '<string name="lyrics_chinese_traditional">歌詞</string>',
                  s
              )
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(s)
          print("Updated button label to 歌詞")

          # --- 4. Patch ContentView.smali (state-machine, no triple-quoted smali strings) ---
          import glob as _glob
          _sm = _glob.glob('hymnchtv-decompiled/smali_classes*/org/cog/hymnchtv/ContentView.smali')
          if not _sm:
              print("WARNING: ContentView.smali not found")
          else:
              SMALI = _sm[0]
              print("Found: " + SMALI)
              with open(SMALI, encoding='utf-8') as f:
                  lines = f.readlines()

              # 4a. State machine: find :cond_0 followed by hasEnglishLyrics, replace block
              new_lines = []
              i = 0
              patched_onclick = False
              while i < len(lines):
                  line = lines[i]
                  if line.strip() == ':cond_0' and not patched_onclick:
                      j = i + 1
                      while j < len(lines) and lines[j].strip() == '':
                          j += 1
                      if j < len(lines) and 'hasEnglishLyrics' in lines[j]:
                          k = j + 1
                          while k < len(lines) and lines[k].strip() != 'return-void':
                              k += 1
                          ind = '    '
                          new_lines.append(ind + ':cond_0\n')
                          new_lines.append(ind + 'iget-boolean p1, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'xor-int/lit8 p1, p1, 0x1\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'iput-boolean p1, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'invoke-direct {p0}, Lorg/cog/hymnchtv/ContentView;->toggleLyricsView()V\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'return-void\n')
                          patched_onclick = True
                          i = k + 1
                          print("Patched onClick() for button_ts")
                          continue
                  new_lines.append(line)
                  i += 1
              if not patched_onclick:
                  print("WARNING: onClick pattern not found")
              lines = new_lines

              # 4b. Change .locals 4 -> .locals 5 in toggleLyricsView
              in_toggle = False
              new_lines = []
              patched_locals = False
              for line in lines:
                  if '.method private toggleLyricsView()V' in line:
                      in_toggle = True
                  if in_toggle and not patched_locals and '.locals 4' in line:
                      line = line.replace('.locals 4', '.locals 5')
                      patched_locals = True
                      print("Patched .locals in toggleLyricsView()")
                  new_lines.append(line)
              lines = new_lines

              # 4c. Insert score_container toggle after lyricsEnglish setVisibility in toggleLyricsView
              in_toggle = False
              new_lines = []
              i = 0
              patched_score = False
              while i < len(lines):
                  line = lines[i]
                  if '.method private toggleLyricsView()V' in line:
                      in_toggle = True
                  if in_toggle and not patched_score and 'lyricsEnglish:Landroid/webkit/WebView;' in line:
                      new_lines.append(line)
                      i += 1
                      while i < len(lines) and lines[i].strip() == '':
                          new_lines.append(lines[i])
                          i += 1
                      if i < len(lines) and 'WebView;->setVisibility(I)V' in lines[i]:
                          new_lines.append(lines[i])
                          i += 1
                          ind = '    '
                          new_lines.append('\n')
                          new_lines.append(ind + 'iget-object v2, p0, Lorg/cog/hymnchtv/ContentView;->mConvertView:Landroid/view/View;\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'const v3, 0x7f0a02b7\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'invoke-virtual {v2, v3}, Landroid/view/View;->findViewById(I)Landroid/view/View;\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'move-result-object v4\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'if-eqz v4, :cond_score_skip\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'iget-boolean v2, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'if-nez v2, :cond_score_hide\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'iget-boolean v2, p0, Lorg/cog/hymnchtv/ContentView;->hasEnglishLyrics:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'if-nez v2, :cond_score_hide\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'const/4 v2, 0x0\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'invoke-virtual {v4, v2}, Landroid/view/View;->setVisibility(I)V\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'goto :cond_score_skip\n')
                          new_lines.append('\n')
                          new_lines.append(ind + ':cond_score_hide\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'invoke-virtual {v4, v1}, Landroid/view/View;->setVisibility(I)V\n')
                          new_lines.append('\n')
                          new_lines.append(ind + ':cond_score_skip\n')
                          patched_score = True
                          print("Patched toggleLyricsView() with score_container toggle")
                      continue
                  new_lines.append(line)
                  i += 1
              if not patched_score:
                  print("WARNING: toggleLyricsView score_container patch not applied")

              with open(SMALI, 'w', encoding='utf-8') as f:
                  f.writelines(new_lines)
              print("ContentView.smali patched")
          PYEOF

      - name: Hide 教唱/唱詩/媒體 buttons, keep only 伴奏 and search
        run: |
          python3 << 'PYEOF'
          import os, re
          LAYOUT = 'hymnchtv-decompiled/res/layout/media_select.xml'
          if not os.path.exists(LAYOUT):
              print("WARNING: media_select.xml not found")
          else:
              with open(LAYOUT, encoding='utf-8') as f:
                  content = f.read()
              for btn in ['btn_media', 'btn_jiaochang', 'btn_changshi']:
                  content = content.replace(
                      f'android:id="@id/{btn}"',
                      f'android:id="@id/{btn}" android:visibility="gone"'
                  )
              with open(LAYOUT, 'w', encoding='utf-8') as f:
                  f.write(content)
              print("Hidden unwanted media buttons")
          PYEOF

