name: Build Traditional Chinese APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-tw-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download apktool
        run: |
          curl -fL -o apktool.jar \
            "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar"
          ls -lh apktool.jar

      - name: Download HymnchtTV APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_URL=$(gh api repos/cmeng-git/hymnchtv/releases/latest \
            --jq '.assets[] | select(.name | endswith(".apk")) | .browser_download_url' \
            | head -1)
          echo "Downloading: $APK_URL"
          curl -fL -o hymnchtv-release.apk "$APK_URL"
          ls -lh hymnchtv-release.apk

      - name: Decompile APK
        run: |
          java -jar apktool.jar d hymnchtv-release.apk -o hymnchtv-decompiled -f

      - name: Patch smali to force Traditional Chinese locale
        run: |
          # LocaleHelper.smali: change all "zh_CN" defaults to "zh_TW"
          LOCALE_HELPER=$(find hymnchtv-decompiled -name "LocaleHelper.smali" | head -1)
          if [ -n "$LOCALE_HELPER" ]; then
            sed -i 's/"zh_CN"/"zh_TW"/g' "$LOCALE_HELPER"
            echo "Patched $LOCALE_HELPER"
            grep -n "zh_" "$LOCALE_HELPER" || true
          else
            echo "WARNING: LocaleHelper.smali not found"
          fi

          # HymnsApp.smali: change SharedPreferences default from zh_CN to zh_TW
          HYMNS_APP=$(find hymnchtv-decompiled -name "HymnsApp.smali" | head -1)
          if [ -n "$HYMNS_APP" ]; then
            sed -i 's/const-string \(.*\), "zh_CN"/const-string \1, "zh_TW"/g' "$HYMNS_APP"
            echo "Patched $HYMNS_APP"
            grep -n "zh_" "$HYMNS_APP" || true
          else
            echo "WARNING: HymnsApp.smali not found"
          fi

          # MainActivity.smali: change language picker selection from zh_CN to zh_TW
          MAIN_ACTIVITY=$(find hymnchtv-decompiled -name "MainActivity.smali" | head -1)
          if [ -n "$MAIN_ACTIVITY" ]; then
            sed -i 's/const-string \(.*\), "zh_CN"/const-string \1, "zh_TW"/g' "$MAIN_ACTIVITY"
            echo "Patched $MAIN_ACTIVITY"
            grep -n "zh_" "$MAIN_ACTIVITY" | head -20 || true
          else
            echo "WARNING: MainActivity.smali not found"
          fi

      - name: Add score/lyrics toggle button and patch ContentView smali
        run: |
          python3 << 'PYEOF'
          import re

          # --- 1. Wrap score ImageViews in score_container in content_lyrics.xml ---
          LAYOUT = 'hymnchtv-decompiled/res/layout/content_lyrics.xml'
          with open(LAYOUT, encoding='utf-8') as f:
              content = f.read()

          # Find the first ImageView (contentView) and the button row LinearLayout
          # Wrap all 5 ImageViews in a score_container LinearLayout
          IMAGES_BLOCK = (
              '<ImageView android:id="@id/contentView" android:layout_width="fill_parent" '
              'android:layout_height="fill_parent" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_a" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_b" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_c" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_d" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />'
          )
          IMAGES_WRAPPED = (
              '<LinearLayout android:id="@id/score_container" android:orientation="vertical" '
              'android:layout_width="fill_parent" android:layout_height="wrap_content" android:visibility="gone">\n'
              '        <ImageView android:id="@id/contentView" android:layout_width="fill_parent" '
              'android:layout_height="fill_parent" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_a" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_b" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_c" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        <ImageView android:id="@id/contentView_d" android:layout_width="fill_parent" '
              'android:layout_height="wrap_content" android:scaleType="fitStart" android:adjustViewBounds="true" />\n'
              '        </LinearLayout>'
          )
          if IMAGES_BLOCK in content:
              content = content.replace(IMAGES_BLOCK, IMAGES_WRAPPED)
              print("Wrapped score images in score_container")
          else:
              # Fallback: simple regex approach
              content = re.sub(
                  r'(<ImageView android:id="@id/contentView"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_a"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_b"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_c"[^/]*/>\s*'
                   r'<ImageView android:id="@id/contentView_d"[^/]*/>)',
                  r'<LinearLayout android:id="@id/score_container" android:orientation="vertical" android:layout_width="fill_parent" android:layout_height="wrap_content" android:visibility="gone">\n        \1\n        </LinearLayout>',
                  content, flags=re.DOTALL
              )
              print("Wrapped score images in score_container (regex fallback)")

          with open(LAYOUT, 'w', encoding='utf-8') as f:
              f.write(content)

          # --- 2. Add score_container to public.xml ---
          PUBLIC = 'hymnchtv-decompiled/res/values/public.xml'
          with open(PUBLIC, encoding='utf-8') as f:
              pub = f.read()
          SCORE_ENTRY = '    <public type="id" name="score_container" id="0x7f0a02b7" />\n'
          if 'score_container' not in pub:
              # Insert after youtube_player_view entry
              pub = pub.replace(
                  '    <public type="id" name="zoom" id="0x7f0a02b6" />',
                  '    <public type="id" name="zoom" id="0x7f0a02b6" />\n' + SCORE_ENTRY
              )
              with open(PUBLIC, 'w', encoding='utf-8') as f:
                  f.write(pub)
              print("Added score_container to public.xml")

          # --- 3. Change button_ts label in strings.xml ---
          for path in [
              'hymnchtv-decompiled/res/values/strings.xml',
              'hymnchtv-decompiled/res/values-zh-rTW/strings.xml',
              'hymnchtv-decompiled/res/values-zh-rCN/strings.xml',
          ]:
              import os
              if not os.path.exists(path):
                  continue
              with open(path, encoding='utf-8') as f:
                  s = f.read()
              s = re.sub(
                  r'<string name="lyrics_chinese_traditional">.*?</string>',
                  '<string name="lyrics_chinese_traditional">ж≠Ми©Ю</string>',
                  s
              )
              with open(path, 'w', encoding='utf-8') as f:
                  f.write(s)
          print("Updated button label to ж≠Ми©Ю")

          # --- 4. Patch ContentView.smali (state-machine, no triple-quoted smali strings) ---
          import glob as _glob
          _sm = _glob.glob('hymnchtv-decompiled/smali_classes*/org/cog/hymnchtv/ContentView.smali')
          if not _sm:
              print("WARNING: ContentView.smali not found")
          else:
              SMALI = _sm[0]
              print("Found: " + SMALI)
              with open(SMALI, encoding='utf-8') as f:
                  lines = f.readlines()

              # 4a. State machine: find :cond_0 followed by hasEnglishLyrics, replace block
              new_lines = []
              i = 0
              patched_onclick = False
              while i < len(lines):
                  line = lines[i]
                  if line.strip() == ':cond_0' and not patched_onclick:
                      j = i + 1
                      while j < len(lines) and lines[j].strip() == '':
                          j += 1
                      if j < len(lines) and 'hasEnglishLyrics' in lines[j]:
                          k = j + 1
                          while k < len(lines) and lines[k].strip() != 'return-void':
                              k += 1
                          ind = '    '
                          new_lines.append(ind + ':cond_0\n')
                          new_lines.append(ind + 'iget-boolean p1, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'xor-int/lit8 p1, p1, 0x1\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'iput-boolean p1, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'invoke-direct {p0}, Lorg/cog/hymnchtv/ContentView;->toggleLyricsView()V\n')
                          new_lines.append('\n')
                          new_lines.append(ind + 'return-void\n')
                          patched_onclick = True
                          i = k + 1
                          print("Patched onClick() for button_ts")
                          continue
                  new_lines.append(line)
                  i += 1
              if not patched_onclick:
                  print("WARNING: onClick pattern not found")
              lines = new_lines

              # 4b. Insert score/text toggle at START of toggleLyricsView (after .locals line)
              # isSimplify=true  вЖТ show score_container, hide all text views, return-void
              # isSimplify=false вЖТ hide score_container, fall through to original code (shows text)
              in_toggle = False
              patched_toggle = False
              new_lines = []
              for line in lines:
                  new_lines.append(line)
                  if '.method private toggleLyricsView()V' in line:
                      in_toggle = True
                  if in_toggle and not patched_toggle and line.strip().startswith('.locals '):
                      ind = '    '
                      new_lines.append('\n')
                      new_lines.append(ind + 'iget-boolean v0, p0, Lorg/cog/hymnchtv/ContentView;->isSimplify:Z\n')
                      new_lines.append(ind + 'if-eqz v0, :cond_score_text_mode\n')
                      new_lines.append('\n')
                      new_lines.append(ind + 'iget-object v1, p0, Lorg/cog/hymnchtv/ContentView;->mConvertView:Landroid/view/View;\n')
                      new_lines.append(ind + 'const v2, 0x7f0a02b7\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->findViewById(I)Landroid/view/View;\n')
                      new_lines.append(ind + 'move-result-object v1\n')
                      new_lines.append(ind + 'if-eqz v1, :cond_score_text_mode\n')
                      new_lines.append('\n')
                      new_lines.append(ind + 'const/4 v2, 0x0\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->setVisibility(I)V\n')
                      new_lines.append('\n')
                      new_lines.append(ind + 'const/16 v2, 0x8\n')
                      new_lines.append(ind + 'iget-object v1, p0, Lorg/cog/hymnchtv/ContentView;->lyricsSimplify:Lorg/cog/hymnchtv/utils/ZoomTextView;\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->setVisibility(I)V\n')
                      new_lines.append(ind + 'iget-object v1, p0, Lorg/cog/hymnchtv/ContentView;->lyricsTraditional:Lorg/cog/hymnchtv/utils/ZoomTextView;\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->setVisibility(I)V\n')
                      new_lines.append(ind + 'iget-object v1, p0, Lorg/cog/hymnchtv/ContentView;->lyricsEnglish:Landroid/webkit/WebView;\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->setVisibility(I)V\n')
                      new_lines.append(ind + 'return-void\n')
                      new_lines.append('\n')
                      new_lines.append(ind + ':cond_score_text_mode\n')
                      new_lines.append(ind + 'iget-object v1, p0, Lorg/cog/hymnchtv/ContentView;->mConvertView:Landroid/view/View;\n')
                      new_lines.append(ind + 'const v2, 0x7f0a02b7\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->findViewById(I)Landroid/view/View;\n')
                      new_lines.append(ind + 'move-result-object v1\n')
                      new_lines.append(ind + 'if-eqz v1, :cond_score_no_container\n')
                      new_lines.append(ind + 'const/16 v2, 0x8\n')
                      new_lines.append(ind + 'invoke-virtual {v1, v2}, Landroid/view/View;->setVisibility(I)V\n')
                      new_lines.append(ind + ':cond_score_no_container\n')
                      new_lines.append('\n')
                      patched_toggle = True
                      print("Patched toggleLyricsView() with score/text toggle at beginning")
              if not patched_toggle:
                  print("WARNING: toggleLyricsView patch not found")
              lines = new_lines

              with open(SMALI, 'w', encoding='utf-8') as f:
                  f.writelines(lines)
              print("ContentView.smali patched")

          # --- 5. Patch ContentHandler.smali: share lyrics text instead of image URIs ---
          # In lyricsShare(), replace ArrayList<Uri> share with text-only share
          # Reads fileLyrics (v8=File) content into StringBuilder, calls ShareWith.share(Activity,String)
          import glob as _glob2
          _ch = _glob2.glob('hymnchtv-decompiled/smali_classes*/org/cog/hymnchtv/ContentHandler.smali')
          if not _ch:
              print("WARNING: ContentHandler.smali not found")
          else:
              CH_SMALI = _ch[0]
              print("Found: " + CH_SMALI)
              with open(CH_SMALI, encoding='utf-8') as f:
                  ch_lines = f.readlines()
              in_share = False
              new_ch = []
              i = 0
              patched_ch = False
              while i < len(ch_lines):
                  line = ch_lines[i]
                  if 'method private lyricsShare()V' in line:
                      in_share = True
                  if in_share and '.end method' in line:
                      in_share = False
                  if in_share and not patched_ch and 'new-instance' in line and 'Ljava/util/ArrayList;' in line:
                      j = i + 1
                      while j < len(ch_lines) and 'ShareWith;->share(' not in ch_lines[j]:
                          j += 1
                      i = j + 1
                      ind = '    '
                      new_ch.append(ind + 'new-instance v9, Ljava/io/FileInputStream;\n')
                      new_ch.append(ind + 'invoke-direct {v9, v8}, Ljava/io/FileInputStream;-><init>(Ljava/io/File;)V\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'new-instance v7, Ljava/io/InputStreamReader;\n')
                      new_ch.append(ind + 'const-string v11, "UTF-8"\n')
                      new_ch.append(ind + 'invoke-direct {v7, v9, v11}, Ljava/io/InputStreamReader;-><init>(Ljava/io/InputStream;Ljava/lang/String;)V\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'new-instance v10, Ljava/io/BufferedReader;\n')
                      new_ch.append(ind + 'invoke-direct {v10, v7}, Ljava/io/BufferedReader;-><init>(Ljava/io/Reader;)V\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'new-instance v11, Ljava/lang/StringBuilder;\n')
                      new_ch.append(ind + 'invoke-direct {v11}, Ljava/lang/StringBuilder;-><init>()V\n')
                      new_ch.append('\n')
                      new_ch.append(ind + ':lyrics_read_loop\n')
                      new_ch.append(ind + 'invoke-virtual {v10}, Ljava/io/BufferedReader;->readLine()Ljava/lang/String;\n')
                      new_ch.append(ind + 'move-result-object v3\n')
                      new_ch.append(ind + 'if-eqz v3, :lyrics_read_done\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'invoke-virtual {v11, v3}, Ljava/lang/StringBuilder;->append(Ljava/lang/String;)Ljava/lang/StringBuilder;\n')
                      new_ch.append(ind + 'const-string v3, "\\n"\n')
                      new_ch.append(ind + 'invoke-virtual {v11, v3}, Ljava/lang/StringBuilder;->append(Ljava/lang/String;)Ljava/lang/StringBuilder;\n')
                      new_ch.append(ind + 'goto :lyrics_read_loop\n')
                      new_ch.append('\n')
                      new_ch.append(ind + ':lyrics_read_done\n')
                      new_ch.append(ind + 'invoke-virtual {v10}, Ljava/io/BufferedReader;->close()V\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'invoke-virtual {v11}, Ljava/lang/StringBuilder;->toString()Ljava/lang/String;\n')
                      new_ch.append(ind + 'move-result-object v11\n')
                      new_ch.append('\n')
                      new_ch.append(ind + 'invoke-static {p0, v11}, Lorg/cog/hymnchtv/mediaconfig/ShareWith;->share(Landroid/app/Activity;Ljava/lang/String;)Ljava/lang/Intent;\n')
                      patched_ch = True
                      print("Patched lyricsShare() to share lyrics as text")
                      continue
                  new_ch.append(line)
                  i += 1
              if not patched_ch:
                  print("WARNING: ContentHandler lyricsShare patch not applied")
              with open(CH_SMALI, 'w', encoding='utf-8') as f:
                  f.writelines(new_ch)
              print("ContentHandler.smali patched")
          PYEOF

      - name: Hide жХЩеФ±/еФ±и©©/е™ТйЂФ buttons, keep only дЉіе•П and search
        run: |
          python3 << 'PYEOF'
          import os, re
          LAYOUT = 'hymnchtv-decompiled/res/layout/media_select.xml'
          if not os.path.exists(LAYOUT):
              print("WARNING: media_select.xml not found")
          else:
              with open(LAYOUT, encoding='utf-8') as f:
                  content = f.read()
              for btn in ['btn_media', 'btn_jiaochang', 'btn_changshi']:
                  content = content.replace(
                      f'android:id="@id/{btn}"',
                      f'android:id="@id/{btn}" android:visibility="gone"'
                  )
              with open(LAYOUT, 'w', encoding='utf-8') as f:
                  f.write(content)
              print("Hidden unwanted media buttons")
          PYEOF

      - name: Convert strings to Traditional Chinese
        run: |
          python3 << 'PYEOF'
          import re, os, xml.etree.ElementTree as ET

          S2T = {
            'зИ±':'жДЫ','зҐН':'з§Щ','иВЃ':'й™ѓ','е••':'е•І','зљҐ':'зљЈ','е§З':'еВЩ','иіЭ':'и≤Э','зђФ':'з≠Ж',
            'жѓХ':'зХҐ','иЊє':'йВК','еПШ':'иЃК','ж†З':'ж®Щ','еИЂ':'еИ•','еЃЊ':'и≥У','еєґ':'дЄ¶','и°•':'и£Ь',
            'иіҐ':'и≤°','дЇІ':'зФҐ','е±В':'е±§','йХњ':'йХЈ','е∞Э':'еШЧ','еЬЇ':'е†і','иљ¶':'иїК','е∞Ш':'е°µ',
            'зІ∞':'з®±','е§Д':'иЩХ','дЉ†':'еВ≥','еИЫ':'еЙµ','дїО':'еЊЮ','иЊЊ':'йБФ','еЄ¶':'еЄґ','ељУ':'зХґ',
            'еѓЉ':'е∞О','зБѓ':'зЗИ','жХМ':'жХµ','йАТ':'йБЮ','зВє':'йїЮ','зФµ':'йЫї','еП†':'зЦК','иЃҐ':'и®В',
            'еК®':'еЛХ','жЦ≠':'жЦЈ','еѓє':'е∞Н','еР®':'еЩЄ','еПС':'зЩЉ','дЄ∞':'и±Р','й£О':'йҐ®','е¶З':'е©¶',
            'иѓ•':'и©≤','еИЪ':'еЙЫ','зїЩ':'зµ¶','еЕ≥':'йЧЬ','еєњ':'еї£','ељТ':'ж≠Є','еЫљ':'еЬЛ','ињЗ':'йБО',
            'еПЈ':'иЩЯ','ж±Й':'жЉҐ','жђҐ':'ж≠°','ињШ':'йВД','еНО':'иПѓ','иѓЭ':'и©±','еИТ':'еКГ','жАА':'жЗЈ',
            'иОЈ':'зН≤','жЬЇ':'ж©Я','жЮБ':'ж•µ','иЃ°':'и®И','йЩЕ':'йЪЫ','зїІ':'зєЉ','йЧі':'йЦУ','зЫС':'зЫ£',
            'иИ∞':'иЙ¶','е∞Ж':'е∞З','иКВ':'зѓА','е∞љ':'зЫ°','ињЫ':'йА≤','зїП':'зґУ','жЧІ':'иИК','дЄЊ':'иИЙ',
            'еЉА':'йЦЛ','йҐЧ':'й°Ж','еЭЧ':'е°К','еЃљ':'еѓђ','жЭ•':'дЊЖ','иІИ':'и¶љ','зГВ':'зИЫ','еК≥':'еЛЮ',
            'дєР':'ж®В','з±ї':'й°Ю','еОЖ':'ж≠Ј','иБФ':'иБѓ','жАЬ':'жЖР','зїГ':'зЈі','йҐЖ':'й†Ш','дЄі':'иЗ®',
            'зБµ':'йЭИ','ељХ':'йМД','дє±':'дЇВ','жї°':'жїњ','дїђ':'еАС','зБ≠':'жїЕ','еЇЩ':'еїЯ','жВѓ':'жЖЂ',
            'йЪЊ':'йЫ£','иДС':'иЕ¶','еЃБ':'еѓІ','еЖЬ':'иЊ≤','иѓЇ':'иЂЊ','зЫШ':'зЫ§','й£Ш':'й£Д','ж∞Ф':'ж∞£',
            'еРѓ':'еХЯ','йТ±':'йМҐ','еЉЇ':'еЉЈ','дЇ≤':'и¶™','иѓЈ':'иЂЛ','еЇЖ':'жЕґ','з©Ј':'з™Ѓ','иґЛ':'иґ®',
            'иЃ©':'иЃУ','зГ≠':'зЖ±','иЃ§':'и™Н','иµП':'и≥Ю','е£∞':'иБ≤','иГЬ':'еЛЭ','жЧґ':'жЩВ','еЃЮ':'еѓ¶',
            'иѓЖ':'и≠Ш','дє¶':'жЫЄ','й°Ї':'й†Ж','иѓі':'и™™','йЪП':'йЪ®','й°ї':'й†И','иЩљ':'йЫЦ',
            'жАБ':'жЕЛ','и∞И':'иЂЗ','йҐШ':'й°М','дљУ':'йЂФ','е§і':'й†≠','еЫЊ':'еЬЦ','еЫҐ':'еЬШ','дЄЇ':'зВЇ',
            'йЧЃ':'еХП','жЧ†':'зД°','еК°':'еЛЩ',
            'жШЊ':'й°ѓ','зО∞':'зПЊ','еНП':'еНФ','йАЙ':'йБЄ','е≠¶':'е≠Є','еѓї':'е∞Л','еОЛ':'е£У','йШ≥':'йЩљ',
