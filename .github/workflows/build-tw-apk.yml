            '鱼':'魚','参':'參','娱':'娛','灾':'災','员':'員','库':'庫','懒':'懶',
            '玛':'瑪','皱':'皺','诵':'誦','侧':'側','厉':'厲','刹':'剎','浅':'淺',
            '隶':'隸','顿':'頓','戏':'戲','矿':'礦','吓':'嚇','网':'網',
