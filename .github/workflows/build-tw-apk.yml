            '会':'會','权':'權','贵':'貴','恶':'惡','转':'轉','种':'種',
            '败':'敗','负':'負','坏':'壞','军':'軍','绑':'綁','质':'質',
            '杀':'殺','扰':'擾','赶':'趕','彻':'徹','绳':'繩','颈':'頸',
            '辈':'輩','寿':'壽','约':'約','扬':'揚','弃':'棄','炼':'煉',
            '锡':'錫','阔':'闊','费':'費','夺':'奪','奖':'獎','锁':'鎖',
            '续':'續','亏':'虧','携':'攜','张':'張','锋':'鋒','窜':'竄',
            '赋':'賦','炉':'爐','锤':'錘','溃':'潰',
            '凭':'憑','没':'沒','绝':'絕','顾':'顧','忧':'憂','担':'擔',
            '烧':'燒','试':'試','够':'夠','软':'軟','干':'乾','细':'細',
            '扩':'擴','纶':'綸','势':'勢','响':'響','虑':'慮','诉':'訴',
            '数':'數','诚':'誠','触':'觸','梦':'夢','粮':'糧','陈':'陳',
            '缠':'纏','状':'狀','规':'規','纵':'縱','设':'設','报':'報',
            '讨':'討','壮':'壯','伟':'偉','伦':'倫','换':'換','习':'習',
            '组':'組','谦':'謙','债':'債','岁':'歲','错':'錯','赖':'賴',
            '仪':'儀','偿':'償','诡':'詭','唤':'喚','绩':'績','贞':'貞',
            '缚':'縛','帅':'帥','杂':'雜','丝':'絲','筹':'籌','区':'區',
            '绿':'綠','谱':'譜','诞':'誕','画':'畫','议':'議','访':'訪',
            '谨':'謹','抢':'搶','凤':'鳳','额':'額','绵':'綿','乌':'烏',
            '虫':'蟲','绣':'繡','侣':'侶','缓':'緩','缝':'縫','轰':'轟',
            '龙':'龍','绽':'綻','纲':'綱','课':'課','汤':'湯','纸':'紙',
            '础':'礎','肤':'膚','键':'鍵','贡':'貢','钢':'鋼','综':'綜',
            '评':'評','阶':'階','厂':'廠','俩':'倆',
            '许':'許','医':'醫','异':'異','园':'園','辉':'輝','岂':'豈',
            '惊':'驚','迟':'遲','视':'視','坛':'壇','击':'擊','测':'測',
            '执':'執','条':'條','写':'寫','误':'誤','确':'確','双':'雙',
            '废':'廢','遥':'遙','讲':'講','柜':'櫃','东':'東','编':'編',
            '掳':'擄','粪':'糞','牵':'牽','楼':'樓','芦':'蘆','诫':'誡',
            '范':'範','杆':'桿','丛':'叢','纪':'紀','岛':'島','轨':'軌',
            '纷':'紛','诲':'誨','笃':'篤','贬':'貶','辅':'輔','踊':'踴',
            '详':'詳','沟':'溝','揽':'攬','谣':'謠',
            '饼':'餅','堕':'墮','构':'構','聪':'聰','惫':'憊','辩':'辯','垫':'墊',
            '么':'麼','钉':'釘','饮':'飲','畅':'暢','马':'馬','银':'銀','饿':'餓',
            '卫':'衛','铁':'鐵','鹰':'鷹','惭':'慚','杰':'傑','铜':'銅','苍':'蒼',
            '钟':'鐘','弹':'彈','枪':'槍','锚':'錨','钥':'鑰','镜':'鏡','陆':'陸',
            '萦':'縈','锦':'錦','苹':'蘋','针':'針','莱':'萊','蜡':'蠟','颁':'頒',
            '铊':'鉈','镀':'鍍','毙':'斃','滨':'濱','镶':'鑲','册':'冊','锣':'鑼',
            '箫':'簫','渔':'漁','鸡':'雞','猫':'貓',
            '于':'於',
            '亚':'亞','释':'釋','预':'預','犹':'猶','夸':'誇','训':'訓',
            '浇':'澆','艰':'艱','护':'護','布':'佈','贫':'貧','苏':'蘇',
            '诀':'訣','诅':'詛','坟':'墳','迈':'邁','顽':'頑','顶':'頂',
            '筑':'築','鉴':'鑑','觅':'覓','艳':'艷','搀':'攙','伫':'佇',
            '骏':'駿',
            '罗':'羅','闭':'閉','闻':'聞','暂':'暫','闷':'悶','垒':'壘',
            '铺':'鋪','悬':'懸','贯':'貫','缕':'縷','搁':'擱','庐':'廬',
            '阅':'閱','兽':'獸','账':'帳','渗':'滲','储':'儲','阁':'閣',
            '泻':'瀉','昙':'曇','晒':'曬',
            '门':'門','纳':'納','红':'紅','谐':'諧','频':'頻','讥':'譏',
            '铭':'銘','弯':'彎','轮':'輪','盖':'蓋','跃':'躍','骗':'騙',
            '译':'譯','贪':'貪','载':'載','疯':'瘋','驻':'駐','谅':'諒',
            '闲':'閒','驾':'駕','绘':'繪','盏':'盞','盐':'鹽','讽':'諷',
            '谎':'謊','镇':'鎮','页':'頁','籁':'籟','誉':'譽','辟':'闢',
            '贿':'賄','赂':'賂','谊':'誼','谤':'謗','铲':'鏟','颠':'顛',
            '峡':'峽','痴':'癡','谗':'讒','驯':'馴','骑':'騎','骚':'騷',
            '骤':'驟','驴':'驢','驼':'駝','颤':'顫','辆':'輛','湿':'濕',
            '瘪':'癟','逻':'邏',
            '职':'職','阴':'陰','脸':'臉','麦':'麥','惨':'慘','拦':'攔',
            '搅':'攪','挤':'擠','烁':'爍','屡':'屢','胁':'脅','荐':'薦',
            '齿':'齒','烫':'燙','裤':'褲','简':'簡',
          }

          def s2t(s):
              return ''.join(S2T.get(c, c) for c in s)

          src = 'hymnchtv-decompiled/res/values/strings.xml'
          dst_dir = 'hymnchtv-decompiled/res/values-zh-rTW'
          dst = os.path.join(dst_dir, 'strings.xml')
          os.makedirs(dst_dir, exist_ok=True)

          with open(src, encoding='utf-8') as f:
              content = f.read()

          # Convert all string values using regex to preserve XML tags
          def convert_value(m):
              tag_open = m.group(1)
              value = m.group(2)
              tag_close = m.group(3)
              # Apply S2T to text portions only (between XML tags)
              converted = re.sub(r'([^<>]+)', lambda t: s2t(t.group(1)), value)
              return tag_open + converted + tag_close

          result = re.sub(
              r'(<string[^>]*>)(.*?)(</string>)',
              convert_value,
              content,
              flags=re.DOTALL
          )

          # Write existing zh-rTW file if it exists, merge otherwise
          if os.path.exists(dst):
              with open(dst, encoding='utf-8') as f:
                  existing = f.read()
              # Get existing string names
              existing_names = set(re.findall(r'<string name="([^"]+)"', existing))
              # Get all strings from result
              new_strings = re.findall(r'<string name="([^"]+)"[^>]*>.*?</string>', result, re.DOTALL)
              # Add new strings not already in existing
              new_entries = []
              for m in re.finditer(r'    (<string name="([^"]+)"[^>]*>.*?</string>)', result, re.DOTALL):
                  if m.group(2) not in existing_names:
                      new_entries.append(m.group(1))
              if new_entries:
                  insert = '\n    '.join(new_entries)
                  existing = existing.replace('</resources>', f'    {insert}\n</resources>')
              with open(dst, 'w', encoding='utf-8') as f:
                  f.write(existing)
              print(f"Merged {len(new_entries)} new strings into {dst}")
          else:
              with open(dst, 'w', encoding='utf-8') as f:
                  f.write(result)
              print(f"Wrote {dst}")

          PYEOF

      - name: Recompile APK
        run: |
          java -jar apktool.jar b hymnchtv-decompiled -o hymnchtv-tw-unsigned.apk

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore hymn.keystore \
            -alias hymntw \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass hymntw123 \
            -keypass hymntw123 \
            -dname "CN=HymnTW, OU=HymnTW, O=HymnTW, L=TW, S=TW, C=TW"
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore hymn.keystore \
            -storepass hymntw123 \
            -keypass hymntw123 \
            hymnchtv-tw-unsigned.apk hymntw
          mv hymnchtv-tw-unsigned.apk hymnchtv-tw.apk

      - name: Create or update GitHub Release
        run: |
          TAG="tw-latest"
          # Delete existing release if present
          gh release delete "$TAG" --yes 2>/dev/null || true
          git tag -d "$TAG" 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
          # Create new release with the APK
          gh release create "$TAG" hymnchtv-tw.apk \
            --title "HymnchtTV 繁體中文介面版" \
            --notes "基於 HymnchtTV v2.8.2，將 App 界面文字轉換為繁體中文（台灣）。安裝後請將手機語言設定為「中文（繁體、台灣）」。" \
            --repo alice55505-source/hymn
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
