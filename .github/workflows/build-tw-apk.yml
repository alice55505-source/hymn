            '饥':'飢','饰':'飾','验':'驗','输':'輸','择':'擇','辖':'轄',
            '沦':'淪','涛':'濤','滚':'滾','骇':'駭','渊':'淵','沥':'瀝',
            '馁':'餒','湾':'灣','澜':'瀾','骋':'騁','滥':'濫',
            '拣':'揀','颂':'頌','赐':'賜','赎':'贖','献':'獻','祷':'禱',
            '饶':'饒','净':'淨','洁':'潔','纯':'純','荣':'榮','圣':'聖',
            '恒':'恆','宝':'寶','紧':'緊','辞':'辭','词':'詞','离':'離',
            '谢':'謝','论':'論','单':'單','属':'屬','读':'讀','见':'見','听':'聽','记':'記',
