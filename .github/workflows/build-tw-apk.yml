          def s2t(s):
              return ''.join(S2T.get(c, c) for c in s)

          src = 'hymnchtv-decompiled/res/values/strings.xml'
          dst_dir = 'hymnchtv-decompiled/res/values-zh-rTW'
          dst = os.path.join(dst_dir, 'strings.xml')
          os.makedirs(dst_dir, exist_ok=True)

          with open(src, encoding='utf-8') as f:
              content = f.read()

          # Convert all string values using regex to preserve XML tags
          def convert_value(m):
              tag_open = m.group(1)
              value = m.group(2)
              tag_close = m.group(3)
              # Apply S2T to text portions only (between XML tags)
              converted = re.sub(r'([^<>]+)', lambda t: s2t(t.group(1)), value)
              return tag_open + converted + tag_close

          result = re.sub(
              r'(<string[^>]*>)(.*?)(</string>)',
              convert_value,
              content,
              flags=re.DOTALL
          )

          # Write zh-rTW (overwrite completely with converted content)
          with open(dst, 'w', encoding='utf-8') as f:
              f.write(result)
          print(f"Wrote {dst}")

          # Rename the language option label from з®ҖдҪ“ to з№Ғй«”
          result = result.replace('дёӯж–Ү(з®ҖдҪ“)', 'дёӯж–Ү(з№Ғй«”)')
          result = result.replace('дёӯж–ҮпјҲз®ҖдҪ“пјү', 'дёӯж–ҮпјҲз№Ғй«”пјү')

          # Also overwrite values/strings.xml so fallback locale gets Traditional Chinese
          with open(src, 'w', encoding='utf-8') as f:
              f.write(result)
          print(f"Updated {src} with Traditional Chinese")

          # Overwrite values-zh-rCN/strings.xml so zh_TW fallback chain also has TW strings
          cn_dir = 'hymnchtv-decompiled/res/values-zh-rCN'
          if os.path.isdir(cn_dir):
              cn_src = os.path.join(cn_dir, 'strings.xml')
              if os.path.exists(cn_src):
                  with open(cn_src, encoding='utf-8') as f:
                      cn_content = f.read()
                  cn_result = re.sub(
                      r'(<string[^>]*>)(.*?)(</string>)',
                      convert_value,
                      cn_content,
                      flags=re.DOTALL
                  )
                  cn_result = cn_result.replace('дёӯж–Ү(з®ҖдҪ“)', 'дёӯж–Ү(з№Ғй«”)')
                  cn_result = cn_result.replace('дёӯж–ҮпјҲз®ҖдҪ“пјү', 'дёӯж–ҮпјҲз№Ғй«”пјү')
                  with open(cn_src, 'w', encoding='utf-8') as f:
                      f.write(cn_result)
                  print(f"Updated {cn_src} with Traditional Chinese")

          PYEOF

      - name: Convert hymn lyrics to Traditional Chinese
        run: |
          pip install opencc-python-reimplemented -q
          python3 << 'PYEOF'
          import opencc, os, glob

          converter = opencc.OpenCC('s2twp')  # Simplified вҶ’ Traditional (Taiwan phrases)

          LYRICS_DIRS = [
              'hymnchtv-decompiled/assets/lyrics_bb_text',
              'hymnchtv-decompiled/assets/lyrics_db_text',
              'hymnchtv-decompiled/assets/lyrics_er_text',
              'hymnchtv-decompiled/assets/lyrics_xb_text',
              'hymnchtv-decompiled/assets/lyrics_xg_text',
              'hymnchtv-decompiled/assets/lyrics_yb_text',
              'hymnchtv-decompiled/assets/lyrics_toc',
          ]

          total = 0
          for d in LYRICS_DIRS:
              if not os.path.isdir(d):
                  print(f"Skipping missing dir: {d}")
                  continue
              for fpath in sorted(glob.glob(os.path.join(d, '*.txt'))):
                  with open(fpath, encoding='utf-8') as f:
                      content = f.read()
                  converted = converter.convert(content)
                  if converted != content:
                      with open(fpath, 'w', encoding='utf-8') as f:
                          f.write(converted)
                      total += 1
          print(f"Converted {total} lyrics files to Traditional Chinese")
          PYEOF

      - name: Patch app icon (д№ҰвҶ’жӣё)
        run: |
          sudo apt-get install -y fonts-noto-cjk -q 2>/dev/null || true
          pip install Pillow -q
          python3 << 'PYEOF'
          from PIL import Image, ImageDraw, ImageFont
          import os

          FONT = '/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc'

          # Reference bounding boxes measured from 512x512 (xxhdpi) icon
          # char 1 = д№Ұ at (317,87)-(378,152)
          REF_SIZE = 512
          REF_BOX = (317, 87, 378, 152)   # x0,y0,x1,y1

          ICON_PATHS = [
              'hymnchtv-decompiled/res/drawable-mdpi/hymnchtv.png',
              'hymnchtv-decompiled/res/drawable-hdpi/hymnchtv.png',
              'hymnchtv-decompiled/res/drawable-xhdpi/hymnchtv.png',
              'hymnchtv-decompiled/res/drawable-xxhdpi/hymnchtv.png',
          ]

          for path in ICON_PATHS:
              if not os.path.exists(path):
                  print(f"Missing: {path}")
                  continue
              img = Image.open(path).convert('RGBA')
              W, H = img.size
              scale = W / REF_SIZE

              x0 = int(REF_BOX[0] * scale)
              y0 = int(REF_BOX[1] * scale)
              x1 = int(REF_BOX[2] * scale)
              y1 = int(REF_BOX[3] * scale)
              bw, bh = x1 - x0, y1 - y0

              # Sample background color from just outside the character box
              bg_pixel = img.getpixel((x0 + bw // 2, max(0, y0 - 5)))
              # Fallback to known navy if sampling fails
              if bg_pixel[0] > 100:
                  bg_pixel = (23, 52, 75, 255)

              draw = ImageDraw.Draw(img)
              draw.rectangle([x0 - 2, y0 - 2, x1 + 2, y1 + 2], fill=bg_pixel)

              font = ImageFont.truetype(FONT, bh)
              bbox = font.getbbox('жӣё')
              tw = bbox[2] - bbox[0]
              th = bbox[3] - bbox[1]
              tx = x0 + (bw - tw) // 2 - bbox[0]
              ty = y0 + (bh - th) // 2 - bbox[1]
              draw.text((tx, ty), 'жӣё', font=font, fill=(255, 255, 255, 255))

              img.save(path)
              print(f"Patched {path} ({W}x{H})")
          PYEOF

      - name: Recompile APK
        run: |
          java -jar apktool.jar b hymnchtv-decompiled -o hymnchtv-tw-unsigned.apk

      - name: Sign APK
        run: |
          keytool -genkey -v \
            -keystore hymn.keystore \
            -alias hymntw \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass hymntw123 \
            -keypass hymntw123 \
            -dname "CN=HymnTW, OU=HymnTW, O=HymnTW, L=TW, S=TW, C=TW"
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          echo "Build tools: $BUILD_TOOLS"
          $BUILD_TOOLS/zipalign -v 4 hymnchtv-tw-unsigned.apk hymnchtv-tw-aligned.apk
          $BUILD_TOOLS/apksigner sign \
            --ks hymn.keystore \
            --ks-pass pass:hymntw123 \
            --key-pass pass:hymntw123 \
            --ks-key-alias hymntw \
            --out hymnchtv-tw.apk \
            hymnchtv-tw-aligned.apk
          $BUILD_TOOLS/apksigner verify --verbose hymnchtv-tw.apk
          ls -lh hymnchtv-tw.apk

