<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a237e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="詩歌本">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>詩歌本</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; overflow: hidden; background: #1a237e; color: #fff;
  font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }

/* ── MAIN SCREEN ── */
#main-screen {
  display: flex; flex-direction: column;
  height: 100%; padding: 6px;
}

/* hint */
#hint {
  text-align: center; font-size: 12px; color: #90caf9;
  padding: 4px 0; line-height: 1.4;
}

/* number display */
#num-display {
  text-align: center; font-size: 48px; font-weight: bold;
  color: #fff; min-height: 60px; letter-spacing: 6px;
  padding: 4px 0;
}
#num-display.empty { color: #5c6bc0; font-size: 18px; font-weight: normal; letter-spacing: 0; }

/* search row */
#search-row {
  display: flex; gap: 6px; margin: 4px 0;
}
#search-input {
  flex: 1; height: 38px; padding: 0 10px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px; color: #fff; font-size: 14px; outline: none;
}
#search-input::placeholder { color: rgba(255,255,255,0.5); }
#toc-btn, #search-btn {
  height: 38px; padding: 0 14px; border: 1px solid rgba(255,255,255,0.4);
  border-radius: 8px; background: rgba(255,255,255,0.15); color: #fff;
  font-size: 13px; cursor: pointer; white-space: nowrap;
}

/* keyboard area */
#keyboard {
  flex: 1; display: flex; gap: 5px; margin-top: 6px;
}
.kb-col { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.kb-col.cat-col { flex: 1.1; }

.kb-btn {
  flex: 1; border-radius: 10px; border: none;
  font-weight: bold; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: #fff;
  background: rgba(255,255,255,0.18);
  transition: background 0.1s, transform 0.1s;
  min-height: 0;
}
.kb-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.96); }

/* special buttons */
.btn-del  { background: rgba(239,83,80,0.7); font-size: 22px; }
.btn-fu   { background: rgba(255,193,7,0.5); font-size: 22px; }

/* category buttons */
.cat-btn {
  flex: 1; border-radius: 10px; border: none;
  font-weight: bold; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #fff;
  transition: background 0.1s, transform 0.1s;
  min-height: 0;
}
.cat-btn:active { transform: scale(0.96); filter: brightness(1.2); }
.cat-db  { background: #c62828; }
.cat-bb  { background: #1565c0; }
.cat-xg  { background: #2e7d32; }
.cat-xb  { background: #6a1b9a; }
.cat-er  { background: #e65100; }

/* ── CONTENT VIEW (score viewer) ── */
#content-view {
  position: fixed; inset: 0; z-index: 100;
  background: #000;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
#content-view.open { transform: translateY(0); }

#content-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: #1a237e;
  flex-shrink: 0; min-height: 44px;
}
#back-btn {
  background: none; border: none; color: #90caf9;
  font-size: 28px; cursor: pointer; padding: 0 6px;
  line-height: 1;
}
#content-info { flex: 1; }
#content-cat  { font-size: 11px; color: #90caf9; }
#content-title { font-size: 15px; font-weight: bold; color: #fff; }
#yt-btn {
  background: #cc0000; color: #fff; border: none;
  border-radius: 6px; padding: 6px 10px; font-size: 12px;
  cursor: pointer; white-space: nowrap; display: none;
}

/* score image area */
#score-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#score-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
  touch-action: pan-y pinch-zoom;
}
#score-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: #90caf9; font-size: 16px; gap: 12px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(255,255,255,0.2);
  border-top-color: #90caf9;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* page indicator */
#page-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.6); color: #fff;
  padding: 3px 10px; border-radius: 12px; font-size: 12px;
  pointer-events: none;
}

/* nav arrows */
#nav-prev, #nav-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.5); color: #fff; border: none;
  border-radius: 50%; width: 40px; height: 40px;
  font-size: 22px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  opacity: 0.7;
}
#nav-prev { left: 6px; }
#nav-next { right: 6px; }

/* lyrics toggle */
#lyrics-panel {
  max-height: 0; overflow: hidden; transition: max-height 0.3s;
  background: #111; color: #ddd;
}
#lyrics-panel.open { max-height: 40vh; overflow-y: auto; }
#lyrics-content { padding: 12px 16px; font-size: 15px; line-height: 1.9; white-space: pre-wrap; }
#lyrics-toggle {
  background: #1a237e; border: none; color: #90caf9;
  width: 100%; padding: 6px; font-size: 13px; cursor: pointer;
  flex-shrink: 0;
}

/* TOC overlay */
#toc-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.6);
  display: none; flex-direction: column;
}
#toc-overlay.open { display: flex; }
#toc-panel {
  background: #1a237e; margin-top: auto;
  max-height: 80vh; display: flex; flex-direction: column;
  border-radius: 16px 16px 0 0;
}
#toc-header {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.2);
}
#toc-title { flex: 1; font-size: 16px; font-weight: bold; }
#toc-close { background: none; border: none; color: #90caf9; font-size: 24px; cursor: pointer; }
#toc-cat-btns { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; }
.toc-cat-btn {
  padding: 6px 14px; border-radius: 16px; border: none;
  color: #fff; font-size: 13px; cursor: pointer; white-space: nowrap;
  opacity: 0.6;
}
.toc-cat-btn.active { opacity: 1; font-weight: bold; }
#toc-search { margin: 0 16px 8px; height: 36px; padding: 0 12px;
  background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3);
  border-radius: 8px; color: #fff; font-size: 14px; outline: none; }
#toc-search::placeholder { color: rgba(255,255,255,0.4); }
#toc-list { flex: 1; overflow-y: auto; }
.toc-item {
  display: flex; align-items: center; padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer;
  gap: 12px;
}
.toc-item:active { background: rgba(255,255,255,0.1); }
.toc-num {
  min-width: 44px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: #fff;
  background: rgba(255,255,255,0.15);
}
.toc-name { font-size: 14px; color: #e3f2fd; }
.toc-section {
  padding: 6px 16px; font-size: 11px; color: #90caf9;
  background: rgba(0,0,0,0.2); letter-spacing: 1px;
  position: sticky; top: 0;
}

/* PWA install banner */
#install-banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: #283593; border-top: 1px solid rgba(255,255,255,0.2);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  transform: translateY(100%); transition: transform 0.4s;
}
#install-banner.show { transform: translateY(0); }
.install-text { flex: 1; font-size: 13px; }
.install-text strong { font-size: 14px; display: block; }
#install-btn {
  background: #90caf9; color: #1a237e; border: none;
  border-radius: 8px; padding: 7px 14px; font-weight: bold;
  font-size: 13px; cursor: pointer;
}
#dismiss-install { background: none; border: none; color: #90caf9; font-size: 20px; cursor: pointer; }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div id="hint">按目錄選項，或輸入（附）編號後按大本、補充、新詩、新頌或兒詩</div>

  <div id="num-display" class="empty">輸入詩歌編號 ↓</div>

  <div id="search-row">
    <input id="search-input" placeholder="歌詞搜尋…" type="search" autocomplete="off">
    <button id="search-btn" onclick="doSearch()">搜尋</button>
    <button id="toc-btn" onclick="openToc('db')">目錄</button>
  </div>

  <div id="keyboard">
    <!-- Col 1: 7 4 1 附 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('7')">7</button>
      <button class="kb-btn" onclick="pressNum('4')">4</button>
      <button class="kb-btn" onclick="pressNum('1')">1</button>
      <button class="kb-btn btn-fu" onclick="pressNum('附')">附</button>
    </div>
    <!-- Col 2: 8 5 2 0 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('8')">8</button>
      <button class="kb-btn" onclick="pressNum('5')">5</button>
      <button class="kb-btn" onclick="pressNum('2')">2</button>
      <button class="kb-btn" onclick="pressNum('0')">0</button>
    </div>
    <!-- Col 3: 9 6 3 刪 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('9')">9</button>
      <button class="kb-btn" onclick="pressNum('6')">6</button>
      <button class="kb-btn" onclick="pressNum('3')">3</button>
      <button class="kb-btn btn-del" onclick="pressDelete()">刪</button>
    </div>
    <!-- Col 4: categories -->
    <div class="kb-col cat-col">
      <button class="cat-btn cat-er" onclick="openHymnByNum('er')">兒詩</button>
      <button class="cat-btn cat-xb" onclick="openHymnByNum('xb')">新頌</button>
      <button class="cat-btn cat-xg" onclick="openHymnByNum('xg')">新詩</button>
      <button class="cat-btn cat-bb" onclick="openHymnByNum('bb')">補充</button>
      <button class="cat-btn cat-db" onclick="openHymnByNum('db')">大本</button>
    </div>
  </div>
</div>

<!-- CONTENT VIEW (score viewer) -->
<div id="content-view">
  <div id="content-header">
    <button id="back-btn" onclick="closeContent()">‹</button>
    <div id="content-info">
      <div id="content-cat"></div>
      <div id="content-title"></div>
    </div>
    <button id="yt-btn">▶ 影音</button>
  </div>

  <div id="score-area">
    <img id="score-img" src="" alt="">
    <div id="score-loading">
      <div class="spinner"></div>
      <span>載入中…</span>
    </div>
    <button id="nav-prev" onclick="navHymn(-1)">‹</button>
    <button id="nav-next" onclick="navHymn(1)">›</button>
    <div id="page-indicator"></div>
  </div>

  <button id="lyrics-toggle" onclick="toggleLyrics()">▼ 顯示歌詞</button>
  <div id="lyrics-panel">
    <div id="lyrics-content"></div>
  </div>
</div>

<!-- TOC OVERLAY -->
<div id="toc-overlay" onclick="closeTocIfBg(event)">
  <div id="toc-panel">
    <div id="toc-header">
      <span id="toc-title">目錄</span>
      <button id="toc-close" onclick="closeToc()">✕</button>
    </div>
    <div id="toc-cat-btns">
      <button class="toc-cat-btn cat-db active" data-cat="db" onclick="switchTocCat('db')">大本詩歌</button>
      <button class="toc-cat-btn cat-bb" data-cat="bb" onclick="switchTocCat('bb')">補充本</button>
      <button class="toc-cat-btn cat-xg" data-cat="xg" onclick="switchTocCat('xg')">新詩</button>
      <button class="toc-cat-btn cat-xb" data-cat="xb" onclick="switchTocCat('xb')">新頌</button>
      <button class="toc-cat-btn cat-er" data-cat="er" onclick="switchTocCat('er')">兒詩</button>
    </div>
    <input id="toc-search" placeholder="搜尋詩歌名稱或編號…" oninput="filterToc(this.value)">
    <div id="toc-list"></div>
  </div>
</div>

<!-- PWA INSTALL BANNER -->
<div id="install-banner">
  <div class="install-text">
    <strong>加入主畫面</strong>
    安裝後可離線使用詩歌本
  </div>
  <button id="install-btn">安裝</button>
  <button id="dismiss-install">✕</button>
</div>

<script>
// ──────────────────────────────────────────────────────────────
// CONFIG
// ──────────────────────────────────────────────────────────────
const BASE = 'https://raw.githubusercontent.com/cmeng-git/hymnchtv/master/hymnchtv/src/main/assets/';

const CATS = {
  db: { label: '大本詩歌', score: 'lyrics_db_score', text: 'lyrics_db_text', prefix: 'db', tocFile: 'toc_db_eng2ch.txt' },
  bb: { label: '補充本',   score: 'lyrics_bb_score', text: 'lyrics_bb_text', prefix: 'bb', tocFile: 'toc_bb_eng2ch.txt' },
  xg: { label: '新詩',     score: 'lyrics_xg_score', text: 'lyrics_xg_text', prefix: 'xg', tocFile: 'toc_xg_eng2ch.txt' },
  xb: { label: '新頌',     score: 'lyrics_xb_score', text: 'lyrics_xb_text', prefix: 'xb', tocFile: 'toc_xb_pinyin.txt' },
  er: { label: '兒詩',     score: 'lyrics_er_score', text: 'lyrics_er_text', prefix: 'er', tocFile: 'toc_er_stroke.txt' },
};

// er score uses NO prefix (just "1.png", not "er1.png")
const SCORE_NOPREFIX = { er: true };


// ──────────────────────────────────────────────────────────────
// STATE
// ──────────────────────────────────────────────────────────────
let numInput = '';         // current number input string
let hasFu = false;         // 附 prefix pressed?
let currentCat = 'db';
let currentNum = 1;
let currentPage = 0;       // for multi-page scores
let currentPages = [];     // ['db1.png'] or ['db128.png','db128a.png',...]
let mediaMap = {};
let tocCache = {};
let tocCurrentCat = 'db';
let tocAllHymns = [];
let deferredInstall = null;

// ──────────────────────────────────────────────────────────────
// SIMPLIFIED → TRADITIONAL
// ──────────────────────────────────────────────────────────────
const S2T = {
  // A–G
  '爱':'愛','碍':'礙','肮':'骯','奥':'奧','罢':'罷','备':'備','贝':'貝','笔':'筆',
  '毕':'畢','边':'邊','变':'變','标':'標','别':'別','宾':'賓','并':'並','补':'補',
  '财':'財','产':'產','层':'層','长':'長','尝':'嘗','场':'場','车':'車','尘':'塵',
  '称':'稱','处':'處','传':'傳','创':'創','从':'從','达':'達','带':'帶','当':'當',
  '导':'導','灯':'燈','敌':'敵','递':'遞','点':'點','电':'電','叠':'疊','订':'訂',
  '动':'動','断':'斷','对':'對','吨':'噸','发':'發','丰':'豐','风':'風','妇':'婦',
  '该':'該','刚':'剛','给':'給','关':'關','广':'廣','归':'歸','国':'國',
  '过':'過',
  // H–J
  '号':'號','汉':'漢','欢':'歡','还':'還','华':'華','话':'話','划':'劃','怀':'懷',
  '获':'獲','机':'機','极':'極','计':'計','际':'際','继':'繼','间':'間','监':'監',
  '舰':'艦','将':'將','节':'節','尽':'盡','进':'進','经':'經','旧':'舊','举':'舉',
  // K–M
  '开':'開','颗':'顆','块':'塊','宽':'寬','来':'來','览':'覽','烂':'爛','劳':'勞',
  '乐':'樂','类':'類','历':'歷','联':'聯','怜':'憐','练':'練','领':'領','临':'臨',
  '灵':'靈','录':'錄','乱':'亂','满':'滿','们':'們','灭':'滅','庙':'廟','悯':'憫',
  // N–Q
  '难':'難','脑':'腦','宁':'寧','农':'農','诺':'諾','盘':'盤','飘':'飄','气':'氣',
  '启':'啟','钱':'錢','强':'強','亲':'親','请':'請','庆':'慶','穷':'窮','趋':'趨',
  // R–S
  '让':'讓','热':'熱','认':'認','赏':'賞','声':'聲','胜':'勝','时':'時','实':'實',
  '识':'識','书':'書','顺':'順','说':'說','随':'隨','须':'須','虽':'雖',
  // T–W
  '态':'態','谈':'談','题':'題','体':'體','头':'頭','图':'圖','团':'團','为':'為',
  '问':'問','无':'無','务':'務',
  // X–Z
  '显':'顯','现':'現','协':'協','选':'選','学':'學','寻':'尋','压':'壓','阳':'陽',
  '叶':'葉','义':'義','亿':'億','忆':'憶','应':'應','赢':'贏','营':'營','优':'優',
  '与':'與','语':'語','远':'遠','愿':'願','运':'運','赞':'讚','凿':'鑿','战':'戰',
  '这':'這','着':'著','赠':'贈','争':'爭','证':'證','织':'織',
  '终':'終','众':'眾','专':'專','庄':'莊','总':'總',
  // Religious / hymn-specific
  '拣':'揀','颂':'頌','赐':'賜','赎':'贖','献':'獻','赞':'讚','祷':'禱','怜':'憐',
  '悯':'憫','宽':'寬','饶':'饒','净':'淨','洁':'潔','纯':'純','荣':'榮','圣':'聖',
  '灵':'靈','归':'歸','义':'義','恒':'恆','爱':'愛','宝':'寶','紧':'緊','华':'華',
  '亲':'親','辞':'辭','词':'詞','离':'離','谢':'謝','论':'論','单':'單','属':'屬',
  '举':'舉','读':'讀','见':'見','听':'聽','记':'記','变':'變','极':'極','终':'終',
  // Additional common characters
  '与':'與','业':'業','乱':'亂','亿':'億','仓':'倉','协':'協','农':'農','务':'務',
  '叹':'嘆','帮':'幫','恳':'懇','怀':'懷','肃':'肅','里':'裡','两':'兩','兴':'興',
  '赛':'賽','谁':'誰','层':'層','维':'維','结':'結','统':'統','练':'練','缘':'緣',
  '觉':'覺','万':'萬','无':'無','却':'卻','属':'屬','华':'華','宝':'寶','亲':'親',
  '丰':'豐','满':'滿','净':'淨','洁':'潔','纯':'純','声':'聲','众':'眾','国':'國',
  '热':'熱','应':'應','间':'間','问':'問','题':'題','谢':'謝','辞':'辭','词':'詞',
  '离':'離','单':'單','诗':'詩','经':'經','节':'節','礼':'禮','荣':'榮','乡':'鄉',
  '汉':'漢','欢':'歡','获':'獲','宁':'寧','书':'書','气':'氣','头':'頭','难':'難',
  '达':'達','联':'聯','获':'獲','个':'個','长':'長','从':'從','开':'開','发':'發',
  '认':'認','给':'給','让':'讓','带':'帶','记':'記','显':'顯','远':'遠','当':'當',
  '学':'學','实':'實','称':'稱','传':'傳','灵':'靈','圣':'聖','赞':'讚','颂':'頌',
  '来':'來','无':'無','须':'須','处':'處','该':'該','举':'舉','顺':'順','紧':'緊',
  '随':'隨','祷':'禱','导':'導','领':'領','临':'臨','义':'義','极':'極','时':'時',
  '动':'動','话':'話','说':'說','这':'這','为':'為','关':'關','进':'進','过':'過',
  '还':'還','现':'現','认':'認','见':'見','听':'聽','变':'變','虽':'雖','却':'卻',
};
function s2t(s){ return s ? [...s].map(c=>S2T[c]||c).join('') : s; }

// ──────────────────────────────────────────────────────────────
// KEYBOARD INPUT
// ──────────────────────────────────────────────────────────────
function pressNum(v) {
  if (v === '附') { hasFu = !hasFu; updateDisplay(); return; }
  if (numInput.length >= 4) return;
  numInput += v;
  updateDisplay();
}
function pressDelete() {
  if (numInput.length > 0) { numInput = numInput.slice(0,-1); updateDisplay(); }
  else if (hasFu) { hasFu = false; updateDisplay(); }
}
function updateDisplay() {
  const el = document.getElementById('num-display');
  if (!numInput && !hasFu) {
    el.textContent = '輸入詩歌編號 ↓'; el.className = 'empty';
  } else {
    el.textContent = (hasFu ? '附 ' : '') + (numInput || '');
    el.className = '';
  }
}

// ──────────────────────────────────────────────────────────────
// OPEN HYMN FROM KEYPAD
// ──────────────────────────────────────────────────────────────
const DB_FU_OFFSET = 780; // 附1~附6 stored as db781~db786

function openHymnByNum(cat) {
  const n = parseInt(numInput);
  if (!n || n < 1) { alert('請先輸入詩歌編號'); return; }
  const isFu = hasFu && cat === 'db';
  if (isFu && (n < 1 || n > 6)) { alert('大本詩歌附詩歌編號為 1 至 6'); return; }
  numInput = ''; hasFu = false; updateDisplay();
  openHymn(cat, isFu ? DB_FU_OFFSET + n : n);
}

// ──────────────────────────────────────────────────────────────
// OPEN HYMN CONTENT
// ──────────────────────────────────────────────────────────────
async function openHymn(cat, num) {
  currentCat = cat; currentNum = num;
  const catInfo = CATS[cat];

  // Update header
  const isFuHymn = cat === 'db' && num > DB_FU_OFFSET;
  const displayNum = isFuHymn ? '附 ' + (num - DB_FU_OFFSET) : '第 ' + num;
  document.getElementById('content-cat').textContent = catInfo.label;
  document.getElementById('content-title').textContent = displayNum + ' 首';
  document.getElementById('yt-btn').style.display = 'none';
  document.getElementById('lyrics-panel').classList.remove('open');
  document.getElementById('lyrics-toggle').textContent = '▼ 顯示歌詞';
  document.getElementById('lyrics-content').textContent = '';

  // Show content view
  document.getElementById('content-view').classList.add('open');
  history.pushState({ hymn: num, cat }, '');

  // Load score images
  await loadScore(cat, num);

  // Load media links (background)
  loadMediaForHymn(cat, num);

  // Pre-load lyrics in background for title update
  loadLyricsTitle(cat, num);
}

async function loadScore(cat, num) {
  const catInfo = CATS[cat];
  const noPrefix = SCORE_NOPREFIX[cat];
  const prefix = noPrefix ? '' : catInfo.prefix;
  const scoreBase = BASE + catInfo.score + '/';

  // Show loading
  const loading = document.getElementById('score-loading');
  const img = document.getElementById('score-img');
  loading.style.display = 'flex';
  img.style.display = 'none';

  // Build list of page URLs to try
  // Main image: {prefix}{num}.png
  // Extra pages: {prefix}{num}a.png, {prefix}{num}b.png, ...
  const pages = [];
  const mainUrl = scoreBase + prefix + num + '.png';
  pages.push(mainUrl);
  // Try a,b,c,d extra pages
  for (const suffix of ['a','b','c','d','e']) {
    pages.push(scoreBase + prefix + num + suffix + '.png');
  }

  // Find which pages actually exist
  const validPages = [];
  validPages.push(mainUrl); // assume main always exists; we'll handle 404 in img.onerror

  // Try extra pages speculatively (only check a,b,c,d)
  const extraChecks = pages.slice(1).map(url =>
    fetch(url, { method: 'HEAD' }).then(r => r.ok ? url : null).catch(() => null)
  );
  const extras = await Promise.all(extraChecks);
  for (const u of extras) { if (u) validPages.push(u); }

  currentPages = validPages;
  currentPage = 0;
  showPage(0);
}

function showPage(idx) {
  const img = document.getElementById('score-img');
  const loading = document.getElementById('score-loading');
  const indicator = document.getElementById('page-indicator');

  loading.style.display = 'flex';
  img.style.display = 'none';

  img.onload = () => {
    loading.style.display = 'none';
    img.style.display = 'block';
    if (currentPages.length > 1) {
      indicator.textContent = (idx + 1) + ' / ' + currentPages.length;
      indicator.style.display = 'block';
    } else {
      indicator.style.display = 'none';
    }
  };
  img.onerror = () => {
    const isFuErr = currentCat === 'db' && currentNum > DB_FU_OFFSET;
    const displayNumErr = isFuErr ? '附 ' + (currentNum - DB_FU_OFFSET) : '第 ' + currentNum;
    loading.innerHTML = '<div style="text-align:center;color:#90caf9;padding:20px">🎵<br>' + displayNumErr + ' 首<br><small style="color:#666">樂譜圖片暫無</small></div>';
  };
  img.src = currentPages[idx];
}

// Navigate within multi-page score
function navWithinScore(dir) {
  const newPage = currentPage + dir;
  if (newPage >= 0 && newPage < currentPages.length) {
    currentPage = newPage;
    showPage(currentPage);
    return true;
  }
  return false;
}

// Navigate to adjacent hymn
function navHymn(dir) {
  if (dir === -1 && !navWithinScore(-1)) {
    openHymn(currentCat, currentNum - 1);
  } else if (dir === 1 && !navWithinScore(1)) {
    openHymn(currentCat, currentNum + 1);
  }
}

// ──────────────────────────────────────────────────────────────
// TOUCH SWIPE (score area)
// ──────────────────────────────────────────────────────────────
let touchStartX = 0;
document.getElementById('score-area').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('score-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navHymn(dx < 0 ? 1 : -1);
}, { passive: true });

// ──────────────────────────────────────────────────────────────
// MEDIA (YouTube)
// ──────────────────────────────────────────────────────────────
async function loadMediaForHymn(cat, num) {
  if (!Object.keys(mediaMap).length) {
    try {
      const txt = await fetch(BASE + 'url_import.txt').then(r=>r.text());
      for (const line of txt.split('\n')) {
        const p = line.trim().split(',');
        if (p.length < 5) continue;
        const key = p[0] + '|' + p[1];
        if (!mediaMap[key]) mediaMap[key] = {};
        if (p[3]==='HYMN_MEDIA') mediaMap[key].yt = p[4];
      }
    } catch(e) {}
  }
  const key = 'hymn_' + cat + '|' + num;
  const ytBtn = document.getElementById('yt-btn');
  if (mediaMap[key]?.yt) {
    ytBtn.style.display = 'inline-block';
    ytBtn.onclick = () => window.open(mediaMap[key].yt, '_blank');
  }
}

// ──────────────────────────────────────────────────────────────
// LYRICS
// ──────────────────────────────────────────────────────────────
async function loadLyricsTitle(cat, num) {
  const catInfo = CATS[cat];
  try {
    const url = BASE + catInfo.text + '/' + catInfo.prefix + num + '.txt';
    const txt = await fetch(url).then(r => r.ok ? r.text() : null);
    if (txt) {
      const lines = txt.split('\n');
      const title = s2t(lines[1]?.trim() || '');
      if (title) {
        const isFuTitle = cat === 'db' && num > DB_FU_OFFSET;
        const displayTitle = isFuTitle ? '附 ' + (num - DB_FU_OFFSET) : '第 ' + num;
        document.getElementById('content-title').textContent = displayTitle + ' 首　' + title;
      }
      document.getElementById('lyrics-content').textContent = s2t(txt);
    }
  } catch(e) {}
}

function toggleLyrics() {
  const panel = document.getElementById('lyrics-panel');
  const btn = document.getElementById('lyrics-toggle');
  const isOpen = panel.classList.toggle('open');
  btn.textContent = isOpen ? '▲ 隱藏歌詞' : '▼ 顯示歌詞';
}

function closeContent() {
  document.getElementById('content-view').classList.remove('open');
  history.back();
}

// ──────────────────────────────────────────────────────────────
// TOC
// ──────────────────────────────────────────────────────────────
function openToc(cat) {
  document.getElementById('toc-overlay').classList.add('open');
  if (tocCurrentCat !== cat || !tocAllHymns.length) switchTocCat(cat);
}
function closeToc() { document.getElementById('toc-overlay').classList.remove('open'); }
function closeTocIfBg(e) { if (e.target === document.getElementById('toc-overlay')) closeToc(); }

async function switchTocCat(cat) {
  tocCurrentCat = cat;
  document.querySelectorAll('.toc-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('toc-title').textContent = CATS[cat].label;

  if (!tocCache[cat]) {
    document.getElementById('toc-list').innerHTML = '<div style="padding:20px;text-align:center;color:#90caf9"><div class="spinner" style="margin:auto"></div></div>';
    const txt = await fetch(BASE + 'lyrics_toc/' + CATS[cat].tocFile).then(r=>r.text());
    tocCache[cat] = parseToc(txt);
  }
  tocAllHymns = tocCache[cat];
  renderTocList(tocAllHymns);
  document.getElementById('toc-search').value = '';
}

function parseToc(txt) {
  const hymns = []; let section = '';
  for (const line of txt.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('^')) {
      const m = t.match(/\^\s+(.+?)\s+#(\d+)/);
      if (m) hymns.push({ title: s2t(m[1].replace(/\d{4}:\s*/,'')), num: +m[2], section });
    } else { section = s2t(t); }
  }
  return hymns;
}

function renderTocList(hymns) {
  const list = document.getElementById('toc-list');
  if (!hymns.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#90caf9">找不到</div>'; return; }
  const frag = document.createDocumentFragment();
  let lastSection = null;
  for (const h of hymns) {
    if (h.section && h.section !== lastSection) {
      const sec = document.createElement('div'); sec.className = 'toc-section'; sec.textContent = h.section;
      frag.appendChild(sec); lastSection = h.section;
    }
    const item = document.createElement('div'); item.className = 'toc-item';
    item.innerHTML = `<div class="toc-num">${h.num}</div><div class="toc-name">${h.title}</div>`;
    item.onclick = () => { closeToc(); openHymn(tocCurrentCat, h.num); };
    frag.appendChild(item);
  }
  list.innerHTML = ''; list.appendChild(frag);
}

function filterToc(q) {
  q = q.trim().toLowerCase();
  const filtered = q ? tocAllHymns.filter(h => h.title.toLowerCase().includes(q) || String(h.num).includes(q)) : tocAllHymns;
  renderTocList(filtered.map(h => ({ ...h, section: '' })));
}

// ──────────────────────────────────────────────────────────────
// SEARCH
// ──────────────────────────────────────────────────────────────
function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  openToc('db');
  setTimeout(() => {
    document.getElementById('toc-search').value = q;
    filterToc(q);
  }, 100);
}

// ──────────────────────────────────────────────────────────────
// BACK BUTTON
// ──────────────────────────────────────────────────────────────
window.addEventListener('popstate', () => {
  if (document.getElementById('content-view').classList.contains('open')) {
    document.getElementById('content-view').classList.remove('open');
  }
});
history.pushState(null, '');

// ──────────────────────────────────────────────────────────────
// PWA INSTALL
// ──────────────────────────────────────────────────────────────
let installDismissed = localStorage.getItem('installDismissed');
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault(); deferredInstall = e;
  if (!installDismissed) setTimeout(() => document.getElementById('install-banner').classList.add('show'), 3000);
});
document.getElementById('install-btn').addEventListener('click', () => {
  if (deferredInstall) { deferredInstall.prompt(); deferredInstall.userChoice.then(() => { document.getElementById('install-banner').classList.remove('show'); }); }
});
document.getElementById('dismiss-install').addEventListener('click', () => {
  localStorage.setItem('installDismissed','1'); document.getElementById('install-banner').classList.remove('show');
});

// iOS hint
if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone && !installDismissed) {
  setTimeout(() => {
    document.getElementById('install-banner').innerHTML = `<div class="install-text"><strong>加入主畫面</strong>點分享 → 「加入主畫面」即可安裝</div><button id="dismiss-install" style="background:none;border:none;color:#90caf9;font-size:20px;cursor:pointer;margin-left:auto" onclick="localStorage.setItem('installDismissed','1');this.closest('#install-banner').classList.remove('show')">✕</button>`;
    document.getElementById('install-banner').classList.add('show');
  }, 3000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(()=>{});
