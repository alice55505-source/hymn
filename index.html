<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#7a4f2a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="詩歌本">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<title>詩歌本</title>
<style>
:root {
  --bg:        #f5ede0;   /* 溫暖米色 */
  --surface:   #ede2cf;   /* 略深米色 */
  --surface2:  #e0d2bb;   /* 卡片底色 */
  --accent:    #7a4f2a;   /* 暖棕色 */
  --accent2:   #5c3a1e;   /* 深棕色 */
  --text:      #2a1a0a;   /* 深咖啡文字 */
  --text2:     #5c3a1e;   /* 中棕次要 */
  --text3:     #9a7d60;   /* 淡棕 tertiary */
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
  font-family: -apple-system, 'PingFang TC', 'Microsoft JhengHei', 'Georgia', serif; }

/* ── MAIN SCREEN ── */
#main-screen {
  display: flex; flex-direction: column;
  height: 100%; padding: 6px;
}

/* hint */
#hint {
  text-align: center; font-size: 12px; color: var(--text3);
  padding: 4px 0; line-height: 1.4;
}

/* number display */
#num-display {
  text-align: center; font-size: 48px; font-weight: bold;
  color: var(--accent); min-height: 60px; letter-spacing: 6px;
  padding: 4px 0;
}
#num-display.empty { color: var(--text3); font-size: 18px; font-weight: normal; letter-spacing: 0; }

/* search row */
#search-row {
  display: flex; gap: 6px; margin: 4px 0;
}
#search-input {
  flex: 1; height: 38px; padding: 0 10px;
  background: rgba(120,80,30,0.07); border: 1px solid rgba(120,80,30,0.25);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none;
}
#search-input::placeholder { color: var(--text3); }
#toc-btn, #search-btn {
  height: 38px; padding: 0 14px; border: 1px solid rgba(120,80,30,0.3);
  border-radius: 8px; background: rgba(120,80,30,0.1); color: var(--accent);
  font-size: 13px; cursor: pointer; white-space: nowrap;
}

/* keyboard area */
#keyboard {
  flex: 1; display: flex; gap: 5px; margin-top: 6px;
}
.kb-col { display: flex; flex-direction: column; gap: 5px; flex: 1; }
.kb-col.cat-col { flex: 1.1; }

.kb-btn {
  flex: 1; border-radius: 10px; border: none;
  font-weight: bold; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: var(--text);
  background: rgba(120,80,30,0.1);
  transition: background 0.1s, transform 0.1s;
  min-height: 0;
}
.kb-btn:active { background: rgba(120,80,30,0.22); transform: scale(0.96); }

/* special buttons */
.btn-del  { background: rgba(160,60,40,0.35); font-size: 22px; }
.btn-fu   { background: rgba(150,110,30,0.28); font-size: 22px; }

/* category buttons */
.cat-btn {
  flex: 1; border-radius: 10px; border: none;
  font-weight: bold; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text);
  transition: background 0.1s, transform 0.1s;
  min-height: 0;
}
.cat-btn:active { transform: scale(0.96); filter: brightness(1.15); }
.cat-db  { background: #9b4030; color: #fff; }  /* 磚紅 */
.cat-bb  { background: #7a5535; color: #fff; }  /* 暖棕 */
.cat-xb  { background: #956828; color: #fff; }  /* 琥珀 */
.cat-er  { background: #6a7830; color: #fff; }  /* 橄欖 */
.cat-xg  { background: #4a7068; color: #fff; }  /* 灰松 */

/* ── CONTENT VIEW (score viewer) ── */
#content-view {
  position: fixed; inset: 0; z-index: 100;
  background: #f5ede0;
  display: flex; flex-direction: column;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
#content-view.open { transform: translateY(0); }

#content-header {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 10px; background: var(--surface);
  flex-shrink: 0; min-height: 44px;
  border-bottom: 1px solid rgba(120,80,30,0.18);
}
#back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 28px; cursor: pointer; padding: 0 6px;
  line-height: 1;
}
#content-info { flex: 1; }
#content-cat  { font-size: 11px; color: var(--text2); }
#content-title { font-size: 15px; font-weight: bold; color: var(--text); }
#yt-btn {
  background: #9b4030; color: #fff; border: none;
  border-radius: 6px; padding: 6px 10px; font-size: 12px;
  cursor: pointer; white-space: nowrap; display: none;
}

/* score image area */
#score-area {
  flex: 1; position: relative; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}
#score-img {
  max-width: 100%; max-height: 100%;
  object-fit: contain; display: block;
  touch-action: pan-y pinch-zoom;
}
#score-loading {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  color: var(--accent); font-size: 16px; gap: 12px;
}
.spinner {
  width: 36px; height: 36px;
  border: 3px solid rgba(120,80,30,0.18);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* page indicator */
#page-indicator {
  position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
  background: rgba(60,35,15,0.72); color: var(--accent);
  padding: 3px 10px; border-radius: 12px; font-size: 12px;
  pointer-events: none;
}

/* nav arrows */
#nav-prev, #nav-next {
  position: absolute; top: 50%; transform: translateY(-50%);
  background: rgba(60,35,15,0.55); color: var(--accent); border: none;
  border-radius: 50%; width: 40px; height: 40px;
  font-size: 22px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  opacity: 0.8;
}
#nav-prev { left: 6px; }
#nav-next { right: 6px; }

/* lyrics toggle */
#lyrics-panel {
  max-height: 0; overflow: hidden; transition: max-height 0.3s;
  background: var(--surface); color: var(--text);
}
#lyrics-panel.open { max-height: 40vh; overflow-y: auto; }
#lyrics-content { padding: 12px 16px; font-size: 15px; line-height: 1.9; white-space: pre-wrap; }
#lyrics-toggle {
  background: var(--surface); border: none; border-top: 1px solid rgba(120,80,30,0.18);
  color: var(--accent2); width: 100%; padding: 6px; font-size: 13px; cursor: pointer;
  flex-shrink: 0;
}

/* TOC overlay */
#toc-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(20,10,0,0.55);
  display: none; flex-direction: column;
}
#toc-overlay.open { display: flex; }
#toc-panel {
  background: var(--surface); margin-top: auto;
  max-height: 80vh; display: flex; flex-direction: column;
  border-radius: 16px 16px 0 0;
  border-top: 1px solid rgba(120,80,30,0.2);
}
#toc-header {
  display: flex; align-items: center; padding: 12px 16px;
  border-bottom: 1px solid rgba(120,80,30,0.15);
}
#toc-title { flex: 1; font-size: 16px; font-weight: bold; color: var(--text); }
#toc-close { background: none; border: none; color: var(--accent2); font-size: 24px; cursor: pointer; }
#toc-cat-btns { display: flex; gap: 6px; padding: 10px 16px; overflow-x: auto; }
.toc-cat-btn {
  padding: 6px 14px; border-radius: 16px; border: none;
  color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap;
  opacity: 0.55;
}
.toc-cat-btn.active { opacity: 1; font-weight: bold; }
#toc-search { margin: 0 16px 8px; height: 36px; padding: 0 12px;
  background: rgba(120,80,30,0.07); border: 1px solid rgba(120,80,30,0.22);
  border-radius: 8px; color: var(--text); font-size: 14px; outline: none; }
#toc-search::placeholder { color: var(--text3); }
#toc-list { flex: 1; overflow-y: auto; }
.toc-item {
  display: flex; align-items: center; padding: 10px 16px;
  border-bottom: 1px solid rgba(120,80,30,0.1); cursor: pointer;
  gap: 12px;
}
.toc-item:active { background: rgba(120,80,30,0.1); }
.toc-num {
  min-width: 44px; height: 32px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: bold; color: var(--accent);
  background: rgba(120,80,30,0.1);
}
.toc-name { font-size: 14px; color: var(--text2); }
.toc-section {
  padding: 6px 16px; font-size: 11px; color: var(--accent2);
  background: rgba(120,80,30,0.1); letter-spacing: 1px;
  position: sticky; top: 0;
}

/* PWA install banner */
#install-banner {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
  background: var(--surface2); border-top: 1px solid rgba(120,80,30,0.2);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px;
  transform: translateY(100%); transition: transform 0.4s;
}
#install-banner.show { transform: translateY(0); }
.install-text { flex: 1; font-size: 13px; color: var(--text2); }
.install-text strong { font-size: 14px; display: block; color: var(--text); }
#install-btn {
  background: var(--accent); color: var(--bg); border: none;
  border-radius: 8px; padding: 7px 14px; font-weight: bold;
  font-size: 13px; cursor: pointer;
}
#dismiss-install { background: none; border: none; color: var(--accent2); font-size: 20px; cursor: pointer; }
</style>
</head>
<body>

<!-- MAIN SCREEN -->
<div id="main-screen">
  <div id="hint">按目錄選項，或輸入（附）編號後按大本、補充、新詩、新頌或兒詩</div>

  <div id="num-display" class="empty">輸入詩歌編號 ↓</div>

  <div id="search-row">
    <input id="search-input" placeholder="搜尋詩歌名稱或歌詞…" type="search" autocomplete="off" onkeydown="if(event.key==='Enter')doSearch()">
    <button id="search-btn" onclick="doSearch()">搜尋</button>
    <button id="toc-btn" onclick="openToc('db')">目錄</button>
  </div>

  <div id="keyboard">
    <!-- Col 1: 7 4 1 附 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('7')">7</button>
      <button class="kb-btn" onclick="pressNum('4')">4</button>
      <button class="kb-btn" onclick="pressNum('1')">1</button>
      <button class="kb-btn btn-fu" onclick="pressNum('附')">附</button>
    </div>
    <!-- Col 2: 8 5 2 0 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('8')">8</button>
      <button class="kb-btn" onclick="pressNum('5')">5</button>
      <button class="kb-btn" onclick="pressNum('2')">2</button>
      <button class="kb-btn" onclick="pressNum('0')">0</button>
    </div>
    <!-- Col 3: 9 6 3 刪 -->
    <div class="kb-col">
      <button class="kb-btn" onclick="pressNum('9')">9</button>
      <button class="kb-btn" onclick="pressNum('6')">6</button>
      <button class="kb-btn" onclick="pressNum('3')">3</button>
      <button class="kb-btn btn-del" onclick="pressDelete()">刪</button>
    </div>
    <!-- Col 4: categories -->
    <div class="kb-col cat-col">
      <button class="cat-btn cat-db" onclick="openHymnByNum('db')">大本</button>
      <button class="cat-btn cat-bb" onclick="openHymnByNum('bb')">補充</button>
      <button class="cat-btn cat-xb" onclick="openHymnByNum('xb')">新頌</button>
      <button class="cat-btn cat-er" onclick="openHymnByNum('er')">兒詩</button>
      <button class="cat-btn cat-xg" onclick="openHymnByNum('xg')">新詩</button>
    </div>
  </div>
</div>

<!-- CONTENT VIEW (score viewer) -->
<div id="content-view">
  <div id="content-header">
    <button id="back-btn" onclick="closeContent()">‹</button>
    <div id="content-info">
      <div id="content-cat"></div>
      <div id="content-title"></div>
    </div>
    <button id="yt-btn">▶ 影音</button>
  </div>

  <div id="score-area">
    <img id="score-img" src="" alt="">
    <div id="score-loading">
      <div class="spinner"></div>
      <span>載入中…</span>
    </div>
    <button id="nav-prev" onclick="navHymn(-1)">‹</button>
    <button id="nav-next" onclick="navHymn(1)">›</button>
    <div id="page-indicator"></div>
  </div>

  <button id="lyrics-toggle" onclick="toggleLyrics()">▼ 顯示歌詞</button>
  <div id="lyrics-panel">
    <div id="lyrics-content"></div>
  </div>
</div>

<!-- TOC OVERLAY -->
<div id="toc-overlay" onclick="closeTocIfBg(event)">
  <div id="toc-panel">
    <div id="toc-header">
      <span id="toc-title">目錄</span>
      <button id="toc-close" onclick="closeToc()">✕</button>
    </div>
    <div id="toc-cat-btns">
      <button class="toc-cat-btn cat-db active" data-cat="db" onclick="switchTocCat('db')">大本詩歌</button>
      <button class="toc-cat-btn cat-bb" data-cat="bb" onclick="switchTocCat('bb')">補充本</button>
      <button class="toc-cat-btn cat-xg" data-cat="xg" onclick="switchTocCat('xg')">新詩</button>
      <button class="toc-cat-btn cat-xb" data-cat="xb" onclick="switchTocCat('xb')">新頌</button>
      <button class="toc-cat-btn cat-er" data-cat="er" onclick="switchTocCat('er')">兒詩</button>
    </div>
    <input id="toc-search" placeholder="搜尋詩歌名稱或編號…" oninput="filterToc(this.value)">
    <div id="toc-list"></div>
  </div>
</div>

<!-- PWA INSTALL BANNER -->
<div id="install-banner">
  <div class="install-text">
    <strong>加入主畫面</strong>
    安裝後可離線使用詩歌本
  </div>
  <button id="install-btn">安裝</button>
</div>

  // 詩歌常用
  '拣':'揀','颂':'頌','赐':'賜','赎':'贖','献':'獻','祷':'禱',
  '饶':'饒','净':'淨','洁':'潔','纯':'純','荣':'榮','圣':'聖',
  '恒':'恆','宝':'寶','紧':'緊','辞':'辭','词':'詞','离':'離',
  '谢':'謝','论':'論','单':'單','属':'屬','读':'讀','见':'見','听':'聽','记':'記',
  '业':'業','仓':'倉','叹':'嘆','帮':'幫','恳':'懇','肃':'肅',
  '里':'裡','两':'兩','兴':'興','赛':'賽','谁':'誰','维':'維',
  '结':'結','统':'統','缘':'緣','觉':'覺','万':'萬','却':'卻',
  '诗':'詩','礼':'禮','乡':'鄉','个':'個',
  // 補充缺漏高頻字
  '会':'會','权':'權','贵':'貴','恶':'惡','转':'轉','种':'種',
  '败':'敗','负':'負','坏':'壞','军':'軍','绑':'綁','质':'質',
  '杀':'殺','扰':'擾','赶':'趕','彻':'徹','绳':'繩','颈':'頸',
  '辈':'輩','寿':'壽','约':'約','扬':'揚','弃':'棄','炼':'煉',
  '锡':'錫','阔':'闊','费':'費','夺':'奪','奖':'獎','锁':'鎖',
  '续':'續','亏':'虧','携':'攜','张':'張','锋':'鋒','窜':'竄',
  '赋':'賦','炉':'爐','锤':'錘','溃':'潰',
};
function s2t(s){ return s ? [...s].map(c=>S2T[c]||c).join('') : s; }

// ──────────────────────────────────────────────────────────────
// KEYBOARD INPUT
// ──────────────────────────────────────────────────────────────
function pressNum(v) {
  if (v === '附') { hasFu = !hasFu; updateDisplay(); return; }
  if (numInput.length >= 4) return;
  numInput += v;
  updateDisplay();
}
function pressDelete() {
  if (numInput.length > 0) { numInput = numInput.slice(0,-1); updateDisplay(); }
  else if (hasFu) { hasFu = false; updateDisplay(); }
}
function updateDisplay() {
  const el = document.getElementById('num-display');
  if (!numInput && !hasFu) {
    el.textContent = '輸入詩歌編號 ↓'; el.className = 'empty';
  } else {
    el.textContent = (hasFu ? '附 ' : '') + (numInput || '');
    el.className = '';
  }
}

// ──────────────────────────────────────────────────────────────
// OPEN HYMN FROM KEYPAD
// ──────────────────────────────────────────────────────────────
const DB_FU_OFFSET = 780; // 附1~附6 stored as db781~db786

function openHymnByNum(cat) {
  const n = parseInt(numInput);
  if (!n || n < 1) { alert('請先輸入詩歌編號'); return; }
  const isFu = hasFu && cat === 'db';
  if (isFu && (n < 1 || n > 6)) { alert('大本詩歌附詩歌編號為 1 至 6'); return; }
  numInput = ''; hasFu = false; updateDisplay();
  openHymn(cat, isFu ? DB_FU_OFFSET + n : n);
}

// ──────────────────────────────────────────────────────────────
// OPEN HYMN CONTENT
// ──────────────────────────────────────────────────────────────
async function openHymn(cat, num) {
  currentCat = cat; currentNum = num;
  const catInfo = CATS[cat];

  // Update header
  const isFuHymn = cat === 'db' && num > DB_FU_OFFSET;
  const displayNum = isFuHymn ? '附 ' + (num - DB_FU_OFFSET) : '第 ' + num;
  document.getElementById('content-cat').textContent = catInfo.label;
  document.getElementById('content-title').textContent = displayNum + ' 首';
  document.getElementById('yt-btn').style.display = 'none';
  document.getElementById('lyrics-panel').classList.remove('open');
  document.getElementById('lyrics-toggle').textContent = '▼ 顯示歌詞';
  document.getElementById('lyrics-content').textContent = '';

  // Show content view
  document.getElementById('content-view').classList.add('open');
  history.pushState({ hymn: num, cat }, '');

  // Load score images
  await loadScore(cat, num);

  // Load media links (background)
  loadMediaForHymn(cat, num);

  // Pre-load lyrics in background for title update
  loadLyricsTitle(cat, num);
}

async function loadScore(cat, num) {
  const catInfo = CATS[cat];
  const noPrefix = SCORE_NOPREFIX[cat];
  const prefix = noPrefix ? '' : catInfo.prefix;
  const scoreBase = BASE + catInfo.score + '/';

  // Show loading
  const loading = document.getElementById('score-loading');
  const img = document.getElementById('score-img');
  loading.style.display = 'flex';
  img.style.display = 'none';

  // Build list of page URLs to try
  // Main image: {prefix}{num}.png
  // Extra pages: {prefix}{num}a.png, {prefix}{num}b.png, ...
  const pages = [];
  const mainUrl = scoreBase + prefix + num + '.png';
  pages.push(mainUrl);
  // Try a,b,c,d extra pages
  for (const suffix of ['a','b','c','d','e']) {
    pages.push(scoreBase + prefix + num + suffix + '.png');
  }

  // Find which pages actually exist
  const validPages = [];
  validPages.push(mainUrl); // assume main always exists; we'll handle 404 in img.onerror

  // Try extra pages speculatively (only check a,b,c,d)
  const extraChecks = pages.slice(1).map(url =>
    fetch(url, { method: 'HEAD' }).then(r => r.ok ? url : null).catch(() => null)
  );
  const extras = await Promise.all(extraChecks);
  for (const u of extras) { if (u) validPages.push(u); }

  currentPages = validPages;
  currentPage = 0;
  showPage(0);
}

function showPage(idx) {
  const img = document.getElementById('score-img');
  const loading = document.getElementById('score-loading');
  const indicator = document.getElementById('page-indicator');

  loading.style.display = 'flex';
  img.style.display = 'none';

  img.onload = () => {
    loading.style.display = 'none';
    img.style.display = 'block';
    if (currentPages.length > 1) {
      indicator.textContent = (idx + 1) + ' / ' + currentPages.length;
      indicator.style.display = 'block';
    } else {
      indicator.style.display = 'none';
    }
  };
  img.onerror = () => {
    const isFuErr = currentCat === 'db' && currentNum > DB_FU_OFFSET;
    const displayNumErr = isFuErr ? '附 ' + (currentNum - DB_FU_OFFSET) : '第 ' + currentNum;
    loading.innerHTML = '<div style="text-align:center;color:#c9a87a;padding:20px">🎵<br>' + displayNumErr + ' 首<br><small style="color:#7a5c3a">樂譜圖片暫無</small></div>';
  };
  img.src = currentPages[idx];
}

// Navigate within multi-page score
function navWithinScore(dir) {
  const newPage = currentPage + dir;
  if (newPage >= 0 && newPage < currentPages.length) {
    currentPage = newPage;
    showPage(currentPage);
    return true;
  }
  return false;
}

// Navigate to adjacent hymn
function navHymn(dir) {
  if (dir === -1 && !navWithinScore(-1)) {
    openHymn(currentCat, currentNum - 1);
  } else if (dir === 1 && !navWithinScore(1)) {
    openHymn(currentCat, currentNum + 1);
  }
}

// ──────────────────────────────────────────────────────────────
// TOUCH SWIPE (score area)
// ──────────────────────────────────────────────────────────────
let touchStartX = 0;
document.getElementById('score-area').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, { passive: true });
document.getElementById('score-area').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navHymn(dx < 0 ? 1 : -1);
}, { passive: true });

// ──────────────────────────────────────────────────────────────
// MEDIA (YouTube)
// ──────────────────────────────────────────────────────────────
async function loadMediaForHymn(cat, num) {
  if (!Object.keys(mediaMap).length) {
    try {
      const txt = await fetch(BASE + 'url_import.txt').then(r=>r.text());
      for (const line of txt.split('\n')) {
        const p = line.trim().split(',');
        if (p.length < 5) continue;
        const key = p[0] + '|' + p[1];
        if (!mediaMap[key]) mediaMap[key] = {};
        if (p[3]==='HYMN_MEDIA') mediaMap[key].yt = p[4];
      }
    } catch(e) {}
  }
  const key = 'hymn_' + cat + '|' + num;
  const ytBtn = document.getElementById('yt-btn');
  if (mediaMap[key]?.yt) {
    ytBtn.style.display = 'inline-block';
    ytBtn.onclick = () => window.open(mediaMap[key].yt, '_blank');
  }
}

// ──────────────────────────────────────────────────────────────
// LYRICS
// ──────────────────────────────────────────────────────────────
async function loadLyricsTitle(cat, num) {
  const catInfo = CATS[cat];
  try {
    const url = BASE + catInfo.text + '/' + catInfo.prefix + num + '.txt';
    const txt = await fetch(url).then(r => r.ok ? r.text() : null);
    if (txt) {
      const lines = txt.split('\n');
      const title = s2t(lines[1]?.trim() || '');
      if (title) {
        const isFuTitle = cat === 'db' && num > DB_FU_OFFSET;
        const displayTitle = isFuTitle ? '附 ' + (num - DB_FU_OFFSET) : '第 ' + num;
        document.getElementById('content-title').textContent = displayTitle + ' 首　' + title;
      }
      document.getElementById('lyrics-content').textContent = s2t(txt);
    }
  } catch(e) {}
}

function toggleLyrics() {
  const panel = document.getElementById('lyrics-panel');
  const btn = document.getElementById('lyrics-toggle');
  const isOpen = panel.classList.toggle('open');
  btn.textContent = isOpen ? '▲ 隱藏歌詞' : '▼ 顯示歌詞';
}

function closeContent() {
  document.getElementById('content-view').classList.remove('open');
  history.back();
}

// ──────────────────────────────────────────────────────────────
// TOC
// ──────────────────────────────────────────────────────────────
function openToc(cat) {
  document.getElementById('toc-overlay').classList.add('open');
  if (tocCurrentCat !== cat || !tocAllHymns.length) switchTocCat(cat);
}
function closeToc() { document.getElementById('toc-overlay').classList.remove('open'); }
function closeTocIfBg(e) { if (e.target === document.getElementById('toc-overlay')) closeToc(); }

async function switchTocCat(cat) {
  tocCurrentCat = cat;
  document.querySelectorAll('.toc-cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  document.getElementById('toc-title').textContent = CATS[cat].label;

  if (!tocCache[cat]) {
    document.getElementById('toc-list').innerHTML = '<div style="padding:20px;text-align:center;color:#c9a87a"><div class="spinner" style="margin:auto"></div></div>';
    const txt = await fetch(BASE + 'lyrics_toc/' + CATS[cat].tocFile).then(r=>r.text());
    tocCache[cat] = parseToc(txt);
  }
  tocAllHymns = tocCache[cat];
  renderTocList(tocAllHymns);
  document.getElementById('toc-search').value = '';
}

function parseToc(txt) {
  const hymns = []; let section = '';
  for (const line of txt.split('\n')) {
    const t = line.trim();
    if (!t) continue;
    if (t.startsWith('^')) {
      const m = t.match(/\^\s+(.+?)\s+#(\d+)/);
      if (m) hymns.push({ title: s2t(m[1].replace(/\d{4}:\s*/,'')), num: +m[2], section });
    } else { section = s2t(t); }
  }
  return hymns;
}

function renderTocList(hymns) {
  const list = document.getElementById('toc-list');
  if (!hymns.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#c9a87a">找不到</div>'; return; }
  const frag = document.createDocumentFragment();
  let lastSection = null;
  for (const h of hymns) {
    if (h.section && h.section !== lastSection) {
      const sec = document.createElement('div'); sec.className = 'toc-section'; sec.textContent = h.section;
      frag.appendChild(sec); lastSection = h.section;
    }
    const item = document.createElement('div'); item.className = 'toc-item';
    item.innerHTML = `<div class="toc-num">${h.num}</div><div class="toc-name">${h.title}</div>`;
    item.onclick = () => { closeToc(); openHymn(tocCurrentCat, h.num); };
    frag.appendChild(item);
  }
  list.innerHTML = ''; list.appendChild(frag);
}

function filterToc(q) {
  q = q.trim().toLowerCase();
  const filtered = q ? tocAllHymns.filter(h => h.title.toLowerCase().includes(q) || String(h.num).includes(q)) : tocAllHymns;
  renderTocList(filtered.map(h => ({ ...h, section: '' })));
}

// ──────────────────────────────────────────────────────────────
// SEARCH (cross-category)
// ──────────────────────────────────────────────────────────────
async function loadLyricsIndex() {
  if (lyricsIndex) return;
  const txt = await fetch('lyrics-index.txt').then(r => r.text());
  lyricsIndex = txt.trim().split('\n').map(line => {
    const [cat, numStr, title, ...bodyParts] = line.split('|');
    const body = s2t(bodyParts.join('|') || '');
    return { cat, num: parseInt(numStr), title: s2t(title || ''), body };
  });
}

function extractSnippet(body, q) {
  const idx = body.toLowerCase().indexOf(q.toLowerCase());
  if (idx === -1) return '';
  const start = Math.max(0, idx - 10);
  const end = Math.min(body.length, idx + q.length + 40);
  let snippet = body.slice(start, end).replace(/\s+/g, ' ').trim();
  if (start > 0) snippet = '…' + snippet;
  if (end < body.length) snippet += '…';
  return snippet;
}

async function doSearch() {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;

  document.getElementById('toc-overlay').classList.add('open');
  document.getElementById('toc-title').textContent = '搜尋：' + q;
  document.getElementById('toc-search').value = '';
  document.querySelectorAll('.toc-cat-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('toc-list').innerHTML =
    '<div style="padding:20px;text-align:center;color:var(--accent)"><div class="spinner" style="margin:auto"></div><div style="margin-top:10px;font-size:13px">搜尋歌詞中…</div></div>';

  try {
    await loadLyricsIndex();
  } catch(e) {
    document.getElementById('toc-list').innerHTML =
      '<div style="padding:24px;text-align:center;color:var(--text2)">無法載入歌詞索引</div>';
    return;
  }

  const ql = q.toLowerCase();
  const titleMatches = [];
  const bodyMatches = [];

  for (const h of lyricsIndex) {
    const inTitle = h.title.toLowerCase().includes(ql) || String(h.num) === q;
    const inBody  = !inTitle && h.body.toLowerCase().includes(ql);
    if (inTitle) titleMatches.push({ ...h, snippet: '' });
    else if (inBody) bodyMatches.push({ ...h, snippet: extractSnippet(h.body, q) });
  }

  const results = [...titleMatches, ...bodyMatches];
  const list = document.getElementById('toc-list');
  if (!results.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text2)">找不到「' + q + '」相符的詩歌</div>';
    return;
  }

  const frag = document.createDocumentFragment();
  for (const h of results) {
    const item = document.createElement('div');
    item.className = 'toc-item';
    const catLabel = CATS[h.cat] ? CATS[h.cat].label : h.cat;
    const isFu = h.cat === 'db' && h.num > DB_FU_OFFSET;
    const displayNum = isFu ? '附' + (h.num - DB_FU_OFFSET) : h.num;
    item.innerHTML =
      `<div class="toc-num">${displayNum}</div>` +
      `<div style="flex:1;min-width:0">` +
        `<div class="toc-name">${h.title}</div>` +
        `<div style="font-size:11px;color:var(--text3);margin-top:2px">${catLabel}</div>` +
        (h.snippet ? `<div style="font-size:11px;color:var(--text2);margin-top:3px;white-space:normal;line-height:1.4">${h.snippet}</div>` : '') +
      `</div>`;
    item.onclick = () => { closeToc(); openHymn(h.cat, h.num); };
    frag.appendChild(item);
  }
  list.innerHTML = '';
  list.appendChild(frag);
}
